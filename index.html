<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunWin - Data Collector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status.running { background: #00c853; color: #fff; }
        .status.stopped { background: #d32f2f; color: #fff; }
        .log {
            background: #0d1117;
            border-radius: 12px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #21262d;
            color: #8b949e;
        }
        .log-entry.success { color: #2ea043; }
        .log-entry.error { color: #f85149; }
        .log-entry.info { color: #58a6ff; }
        button {
            background: #238636;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            transition: all 0.2s;
        }
        button:hover { background: #2ea043; }
        button.danger { background: #da3633; }
        button.danger:hover { background: #f85149; }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 16px;
        }
        .stat {
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 8px;
        }
        .stat-label { font-size: 12px; opacity: 0.7; }
        .stat-value { font-size: 20px; font-weight: bold; }
        hr { border-color: rgba(255,255,255,0.1); margin: 16px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🎲 SunWin Data Collector</h1>
        <p>Thu thập kết quả từ <code>web.sunwin.qa</code> và gửi lên server</p>
        <div>
            <span id="statusBadge" class="status running">● Đang chạy</span>
            <span style="margin-left: 10px; font-size: 12px;">⏱️ Chu kỳ: 3 giây</span>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Phiên đã gửi</div>
                <div class="stat-value" id="lastSession">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Kết quả gần nhất</div>
                <div class="stat-value" id="lastResult">—</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <span>📋 Nhật ký hoạt động</span>
            <div>
                <button id="clearLogBtn">🗑️ Xóa log</button>
                <button id="forceCheckBtn" class="danger">🔄 Kiểm tra ngay</button>
            </div>
        </div>
        <div class="log" id="logContainer">
            <div class="log-entry info">🚀 Collector đã khởi động...</div>
            <div class="log-entry info">📡 API: https://sunwin-tool.onrender.com</div>
        </div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // ============ CẤU HÌNH ============
        const API_BASE = "https://sunwin-tool.onrender.com";
        const SOURCE_API = "https://api-sunwin-urrv.onrender.com/api/history";
        
        // Lưu phiên cuối đã gửi (dùng localStorage thay vì GM_*)
        let lastSentSession = parseInt(localStorage.getItem("collector_last_session") || "0");
        
        // DOM elements
        const logContainer = document.getElementById('logContainer');
        const lastSessionSpan = document.getElementById('lastSession');
        const lastResultSpan = document.getElementById('lastResult');
        let intervalId = null;
        let isRunning = true;

        // ============ HÀM LOG (hiển thị trong UI) ============
        function addLog(message, type = 'info') {
            const logDiv = document.createElement('div');
            logDiv.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString('vi-VN');
            logDiv.textContent = `[${time}] ${message}`;
            logContainer.appendChild(logDiv);
            logDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
            
            // Giới hạn số dòng log (giữ tối đa 200 dòng)
            while (logContainer.children.length > 200) {
                logContainer.removeChild(logContainer.firstChild);
            }
        }

        // ============ FETCH DỮ LIỆU TỪ API NGUỒN ============
        async function fetchSource() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000);
            
            try {
                const response = await fetch(`${SOURCE_API}?_=${Date.now()}`, {
                    method: "GET",
                    headers: { "Accept": "application/json" },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        // ============ GỬI KẾT QUẢ LÊN SERVER ============
        async function sendResult(payload) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            
            try {
                const response = await fetch(`${API_BASE}/api/result`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        // ============ CHUẨN HÓA KẾT QUẢ ============
        function normalize(v) {
            const t = String(v || "").toLowerCase();
            if (t.includes("tài") || t.includes("tai")) return "Tài";
            if (t.includes("xỉu") || t.includes("xiu")) return "Xỉu";
            return null;
        }

        // ============ KIỂM TRA VÀ GỬI DỮ LIỆU ============
        async function collect() {
            if (!isRunning) return;
            
            try {
                addLog("🔍 Đang kiểm tra dữ liệu mới...", "info");
                const data = await fetchSource();
                
                if (!data || !data.current) {
                    addLog("⚠️ Không nhận được dữ liệu từ API nguồn", "error");
                    return;
                }
                
                const c = data.current;
                const session = Number(c.Phien);
                const result = normalize(c.Ket_qua);
                
                addLog(`📊 Nhận phiên #${session} - Kết quả: ${c.Ket_qua || '?'} → Chuẩn hóa: ${result || '???'}`, "info");
                
                if (session > lastSentSession && result) {
                    const payload = {
                        session: session,
                        dice: [Number(c.Xuc_xac_1), Number(c.Xuc_xac_2), Number(c.Xuc_xac_3)],
                        total: Number(c.Tong),
                        result: result,
                        ts: Date.now(),
                    };
                    
                    addLog(`📤 Đang gửi phiên #${session} (${result}) lên server...`, "info");
                    const res = await sendResult(payload);
                    
                    if (res && res.ok !== false) {
                        lastSentSession = session;
                        localStorage.setItem("collector_last_session", session.toString());
                        lastSessionSpan.textContent = session;
                        lastResultSpan.textContent = result;
                        addLog(`✅ THÀNH CÔNG! Đã gửi phiên #${session} → ${result}`, "success");
                    } else {
                        addLog(`❌ Server trả về lỗi: ${JSON.stringify(res)}`, "error");
                    }
                } else if (session <= lastSentSession) {
                    addLog(`⏭️ Bỏ qua phiên #${session} (đã gửi trước đó, lastSent=${lastSentSession})`, "info");
                } else if (!result) {
                    addLog(`⚠️ Không thể chuẩn hóa kết quả: "${c.Ket_qua}"`, "error");
                }
                
            } catch (error) {
                addLog(`❌ Lỗi: ${error.message || 'Không thể kết nối đến API'}`, "error");
                console.error(error);
            }
        }

        // ============ KHỞI ĐỘNG COLLECTOR ============
        function startCollector() {
            if (intervalId) clearInterval(intervalId);
            isRunning = true;
            document.getElementById('statusBadge').className = "status running";
            document.getElementById('statusBadge').innerHTML = "● Đang chạy";
            collect(); // chạy ngay lập tức
            intervalId = setInterval(collect, 3000);
            addLog("▶️ Collector đã khởi động lại", "success");
        }

        function stopCollector() {
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            isRunning = false;
            document.getElementById('statusBadge').className = "status stopped";
            document.getElementById('statusBadge').innerHTML = "● Đã dừng";
            addLog("⏸️ Collector đã dừng", "error");
        }

        // ============ CẬP NHẬT UI HIỂN THỊ ============
        function updateDisplay() {
            lastSessionSpan.textContent = lastSentSession;
        }

        // ============ KIỂM TRA CORS & CHẾ ĐỘ IFrame ============
        // LƯU Ý QUAN TRỌNG: 
        // Collector này CHẠY TRÊN GITHUB PAGES, không phải trên sunwin.qa
        // Nó sẽ gọi API từ xa, KHÔNG thể truy cập DOM của sunwin.qa
        // Nếu bạn muốn chạy TRỰC TIẾP trên trang sunwin.qa, cần dùng UserScript (Tampermonkey)
        // Phiên bản HTML này hoạt động độc lập, chỉ gọi API có sẵn
        
        addLog("🌐 LƯU Ý: Trang này chạy độc lập trên GitHub Pages", "info");
        addLog("📡 Nó gọi API từ: " + SOURCE_API, "info");
        addLog("🎯 Kết quả sẽ gửi về: " + API_BASE + "/api/result", "info");
        addLog("💾 Phiên đã gửi trước đó: " + lastSentSession, "info");
        addLog("=========================================", "info");
        
        // Hiển thị cảnh báo nếu đang chạy trong iframe hoặc cross-origin
        if (window.self !== window.top) {
            addLog("⚠️ Trang đang chạy trong iframe! Một số API có thể bị chặn CORS", "error");
        }
        
        // Kiểm tra CORS bằng cách ping thử
        fetch(`${SOURCE_API}?_=${Date.now()}`, { method: 'HEAD', mode: 'cors' })
            .then(() => addLog("✅ Kết nối CORS tới API nguồn thành công", "success"))
            .catch(() => addLog("⚠️ CORS bị chặn? Kiểm tra console F12", "error"));
        
        updateDisplay();
        
        // Gắn sự kiện cho nút bấm
        document.getElementById('clearLogBtn').onclick = () => {
            while (logContainer.children.length > 2) {
                logContainer.removeChild(logContainer.lastChild);
            }
            addLog("🧹 Đã xóa nhật ký", "info");
        };
        
        document.getElementById('forceCheckBtn').onclick = () => {
            addLog("🔄 Người dùng yêu cầu kiểm tra ngay", "info");
            collect();
        };
        
        // Thêm nút dừng/chạy (tùy chọn)
        const toggleBtn = document.createElement('button');
        toggleBtn.id = 'toggleBtn';
        toggleBtn.textContent = '⏸️ Dừng';
        toggleBtn.onclick = () => {
            if (isRunning) {
                stopCollector();
                toggleBtn.textContent = '▶️ Chạy';
                toggleBtn.classList.add('danger');
            } else {
                startCollector();
                toggleBtn.textContent = '⏸️ Dừng';
                toggleBtn.classList.remove('danger');
            }
        };
        document.querySelector('#forceCheckBtn').parentNode.appendChild(toggleBtn);
        
        // Bắt đầu tự động
        startCollector();
    })();
</script>
</body>
</html>
