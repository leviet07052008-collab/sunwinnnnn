    <style>
        /* ========== RESET & VARIABLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #030014;
            --bg-surface: #0a0a1a;
            --bg-card: rgba(18, 18, 42, 0.7);
            --bg-card-solid: #12122a;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(99, 102, 241, 0.4);
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --gradient-success: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --gradient-warning: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            --gradient-cyber: linear-gradient(135deg, #06b6d4 0%, #6366f1 50%, #a855f7 100%);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.4);
            --shadow-xl: 0 25px 60px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.4);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ========== ANIMATED BACKGROUND ========== */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(168, 85, 247, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.3;
            animation: floatOrb 20s ease-in-out infinite alternate;
        }

        .orb-1 { width: 500px; height: 500px; background: #6366f1; top: -150px; left: -150px; }
        .orb-2 { width: 600px; height: 600px; background: #a855f7; bottom: -200px; right: -200px; animation-delay: -5s; }
        .orb-3 { width: 350px; height: 350px; background: #06b6d4; top: 40%; left: 30%; animation-delay: -10s; opacity: 0.15; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 60px) scale(1.1); }
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration, 4s) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--opacity, 0.7); transform: scale(1); }
        }

        /* Particles */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 999;
        }

        /* ========== MAIN CONTAINER ========== */
        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Section Header */
        .section-header {
            text-align: center;
            margin: 2rem 0 2rem;
            animation: fadeInUp 0.6s ease forwards;
        }

        .section-title {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1.5rem;
            border-radius: 100px;
            backdrop-filter: blur(8px);
        }

        .section-title i {
            font-size: 1.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Game Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-bottom: 3rem;
        }

        /* Game Card */
        .game-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-base);
            cursor: pointer;
            position: relative;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .game-card:nth-child(1) { animation-delay: 0.1s; }
        .game-card:nth-child(2) { animation-delay: 0.2s; }
        .game-card:nth-child(3) { animation-delay: 0.3s; }
        .game-card:nth-child(4) { animation-delay: 0.4s; }
        .game-card:nth-child(5) { animation-delay: 0.5s; }
        .game-card:nth-child(6) { animation-delay: 0.6s; }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
        }

        .game-image-wrapper {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .game-image {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: var(--radius-md);
            transition: transform var(--transition-slow);
            filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.3));
        }

        .game-card:hover .game-image {
            transform: scale(1.1) rotate(-3deg);
            filter: drop-shadow(0 0 30px rgba(99, 102, 241, 0.5));
        }

        .game-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.8) 0%, rgba(168, 85, 247, 0.8) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .game-card:hover .game-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
            transform: scale(0.8) rotate(-180deg);
            transition: transform var(--transition-bounce);
            box-shadow: var(--shadow-lg);
        }

        .game-card:hover .play-icon {
            transform: scale(1) rotate(0deg);
        }

        .game-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--gradient-success);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.3rem 0.9rem;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            backdrop-filter: blur(4px);
            animation: badgePulse 2s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            50% { box-shadow: 0 0 0 4px rgba(16, 185, 129, 0); }
        }

        .game-badge i {
            font-size: 0.6rem;
        }

        /* ========== MODAL ========== */
        .modal-outer {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            background: rgba(3, 0, 20, 0.9);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-inner {
            max-width: 420px;
            width: 90%;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
            position: relative;
            animation: modalSlideUp 0.4s var(--transition-bounce);
        }

        @keyframes modalSlideUp {
            from { transform: translateY(50px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .modal-inner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        .modal-img {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.3));
        }

        #modalName {
            font-size: 1.3rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }

        .key-input {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all var(--transition-base);
            font-family: inherit;
        }

        .key-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .key-input::placeholder {
            color: var(--text-muted);
        }

        .modal-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--gradient-success);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        .modal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .modal-btn:hover::before {
            left: 100%;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .modal-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #keyMsg {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .game-container {
                padding: 1rem;
            }
            
            .game-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 1rem;
            }
            
            .game-image {
                width: 100px;
                height: 100px;
            }
            
            .game-image-wrapper {
                padding: 1.5rem;
            }
            
            .modal-inner {
                padding: 1.5rem;
                margin: 1rem;
            }
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 0.75rem;
            }
            
            .game-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }
            
            .game-image {
                width: 80px;
                height: 80px;
            }
            
            .game-image-wrapper {
                padding: 1rem;
            }
            
            .game-badge {
                top: 0.5rem;
                right: 0.5rem;
                font-size: 0.6rem;
                padding: 0.2rem 0.6rem;
            }
            
            .section-title {
                font-size: 1.3rem;
            }
            
            .modal-img {
                width: 80px;
                height: 80px;
            }
            
            #modalName {
                font-size: 1.1rem;
            }
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

    <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Portal - Tài Xỉu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://toolmrtinhios.fun/assets/css/header.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #0f0f0f;
            --dark-surface: #1a1a1a;
            --dark-elevated: #242424;
            --dark-border: #2d2d2d;
            --dark-accent: #333333;
            --primary-gold: #ffd700;
            --primary-blue: #00d4ff;
            --primary-purple: #8b5cf6;
            --primary-green: #10b981;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #666666;
            --danger-red: #ef4444;
            --warning-orange: #f59e0b;
            --shadow-dark: 0 4px 20px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(255, 215, 0, 0.3);
            --glass-bg: rgba(26, 26, 26, 0.9);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Header Styles */
        .main-header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--dark-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0;
            box-shadow: var(--shadow-dark);
        }

        .main-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-gold), transparent);
            opacity: 0.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.02);
            filter: drop-shadow(0 0 10px var(--primary-gold));
        }

        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            filter: brightness(1.1);
        }

        .logo span {
            background: linear-gradient(135deg, var(--primary-gold), var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Navigation */
        .main-nav {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--primary-gold);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--dark-elevated);
            transform: translateY(-1px);
        }

        .nav-link:hover::before {
            width: 80%;
        }

        .nav-link.active {
            color: var(--primary-gold);
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .nav-link.active::before {
            width: 80%;
        }

        .nav-link.admin-link {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(79, 70, 229, 0.1));
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: var(--primary-purple);
        }

        .nav-link.admin-link:hover {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(79, 70, 229, 0.2));
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        /* Notification Bell */
        .noti-bell {
            position: relative;
            margin: 0 14px;
            cursor: pointer;
            padding: 12px;
            border-radius: 50%;
            background: var(--dark-elevated);
            border: 1px solid var(--dark-border);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .noti-bell:hover {
            background: var(--dark-accent);
            border-color: var(--primary-gold);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }
        
        .noti-bell .fa-bell {
            font-size: 1.2em;
            color: var(--primary-gold);
            transition: all 0.3s ease;
        }
        
        .noti-bell:hover .fa-bell {
            animation: bellShake 0.6s ease-in-out;
            color: var(--text-primary);
        }
        
        .noti-bell .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: linear-gradient(135deg, var(--danger-red), #dc2626);
            color: var(--text-primary);
            border-radius: 10px;
            font-size: 0.65em;
            min-width: 18px;
            height: 18px;
            text-align: center;
            font-weight: 700;
            display: flex;
            align-items: center;

<script>
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('current-balance');
  if (!el) return;

  fetch('https://toolmrtinhios.fun/api/balance.php', {
    method: 'GET',
    credentials: 'same-origin',
    headers: { 'Accept': 'application/json' }
  })
  .then(res => {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(data => {
    const value = Number((data && (data.balance ?? 0)) || 0);
    el.textContent = value.toLocaleString('vi-VN') + ' ₫';
  })
  .catch(() => {
    el.textContent = '0 ₫';
  });
})

document.addEventListener('DOMContentLoaded', function() {
    const bell = document.getElementById('notiBell');
    const popup = document.getElementById('notiPopup');
    let loadedNoti = false;
    
    bell && bell.addEventListener('click', function(e) {
        e.stopPropagation();
        popup.classList.toggle('open');
        
        if (!loadedNoti && popup.classList.contains('open')) {
            loadNotifications();
            loadedNoti = true;
        }
    });
    
    window.addEventListener('click', function(e) {
        if (popup.classList.contains('open') && !popup.contains(e.target)) {
            popup.classList.remove('open');
        }
    });
    
    function loadNotifications() {
        fetch('https://toolmrtinhios.fun/api/notification.php')
            .then(res => res.json())
            .then(data => {
                const notiList = document.getElementById('notiList');
                
                if (data.success && data.notifications.length) {
                    notiList.innerHTML = data.notifications.map((n, index) => `
                        <div class="noti-item${n.is_read ? ' read' : ''}" style="animation-delay: ${index * 0.1}s">
                            <div class="noti-title">${escapeHtml(n.title)}</div>
                            <div class="noti-msg">${escapeHtml(n.message)}</div>
                            <div class="noti-time">${formatTime(n.created_at)}</div>
                        </div>
                    `).join('');
                    
                    let unread = data.notifications.filter(n => !n.is_read).length;
                    updateBadge(unread);
                } else {
                    notiList.innerHTML = `
                        <div class="noti-empty">
                            <i class="fa-solid fa-bell-slash"></i>
                            <h4>Chưa có thông báo</h4>
                            <p>Bạn sẽ nhận được thông báo khi có cập nhật mới</p>
                        </div>
                    `;
                    updateBadge(0);
                }
            })
            .catch(error => {
                console.error('Error loading notifications:', error);
                document.getElementById('notiList').innerHTML = `
                    <div class="noti-empty">
                        <i class="fa-solid fa-exclamation-triangle"></i>
                        <h4>Lỗi tải thông báo</h4>
                        <p>Vui lòng thử lại sau</p>
                    </div>
                `;
            });
    }
    
    function updateBadge(count) {
        const badge = document.getElementById('notiCount');
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.style.display = '';
        } else {
            badge.style.display = 'none';
        }
    }
    
    function formatTime(timeStr) {
        const now = new Date();
        const time = new Date(timeStr);
        const diff = (now - time) / 1000;
        
        if (diff < 60) return 'Vừa xong';
        if (diff < 3600) return Math.floor(diff / 60) + ' phút trước';
        if (diff < 86400) return Math.floor(diff / 3600) + ' giờ trước';
        if (diff < 604800) return Math.floor(diff / 86400) + ' ngày trước';
        
        return time.toLocaleDateString('vi-VN');
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    setInterval(() => {
        if (loadedNoti) {
            loadNotifications();
        }
    }, 300000);
});

function closeNotiPopup() {
    document.getElementById('notiPopup').classList.remove('open');
}

document.querySelector('.user-dropdown')?.addEventListener('click', function(e) {
    this.classList.toggle('open');
    e.stopPropagation();
});

window.addEventListener('click', function() {
    document.querySelector('.user-dropdown')?.classList.remove('open');
});

function toggleMenu() {
    document.querySelector('.main-nav').classList.toggle('show');
}
</script>

/* ===== Telegram FAB (tgfab) – Premium Glassmorphism Version ===== */
:root {
  --tgfab-right: max(20px, env(safe-area-inset-right));
  --tgfab-bottom: calc(20px + env(safe-area-inset-bottom));
  --tgfab-gap: 12px;
  --tgfab-size: 56px;
  --tgfab-radius: 50%;
  --tgfab-bg: linear-gradient(135deg, #2AABEE 0%, #0088cc 100%);
  --tgfab-bg-dark: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
  --tgfab-glow: rgba(42, 171, 238, 0.5);
  --tgfab-text: #ffffff;
  --tgfab-text-secondary: #a1a1aa;
}

@media (max-width: 768px) {
  :root {
    --tgfab-gap: 10px;
    --tgfab-size: 52px;
  }
}

@media (max-width: 480px) {
  :root {
    --tgfab-gap: 8px;
    --tgfab-size: 48px;
  }
}

/* Container chính */
.tgfab {
  position: fixed;
  right: var(--tgfab-right);
  bottom: var(--tgfab-bottom);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: var(--tgfab-gap);
  pointer-events: none;
}

.tgfab__actions, .tgfab__toggle { 
  pointer-events: auto; 
}

/* Actions container */
.tgfab__actions {
  display: flex;
  flex-direction: column;
  gap: var(--tgfab-gap);
}

/* Nút chính (mobile) - Nút Telegram tròn */
.tgfab__toggle {
  display: none;
  width: var(--tgfab-size);
  height: var(--tgfab-size);
  border-radius: var(--tgfab-radius);
  border: none;
  outline: none;
  background: var(--tgfab-bg);
  box-shadow: 0 4px 20px var(--tgfab-glow);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  animation: tgfabPulse 2s ease-in-out infinite;
}

@keyframes tgfabPulse {
  0%, 100% {
    box-shadow: 0 4px 20px rgba(42, 171, 238, 0.4);
  }
  50% {
    box-shadow: 0 8px 30px rgba(42, 171, 238, 0.7);
  }
}

.tgfab__toggle::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  transition: left 0.5s ease;
}

.tgfab__toggle:hover::before {
  left: 100%;
}

.tgfab__toggle:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 8px 30px var(--tgfab-glow);
}

.tgfab__toggle:active {
  transform: translateY(0) scale(0.98);
}

.tgfab__toggle svg {
  width: 26px;
  height: 26px;
  fill: #fff;
  transition: transform 0.3s ease;
}

.tgfab__toggle:hover svg {
  transform: rotate(15deg);
}

/* Nút con - Premium Glassmorphism Style */
.tgfab__btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: rgba(20, 20, 35, 0.9);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: var(--tgfab-text);
  text-decoration: none;
  padding: 10px 22px 10px 18px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
  position: relative;
  overflow: hidden;
  letter-spacing: 0.3px;
}

.tgfab__btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.5s ease;
}

.tgfab__btn:hover::before {
  left: 100%;
}

.tgfab__btn:hover {
  transform: translateY(-3px);
  background: rgba(30, 30, 50, 0.95);
  border-color: rgba(42, 171, 238, 0.3);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
}

.tgfab__btn:active {
  transform: translateY(0);
}

/* Icon Telegram trong nút */
.tgfab__btn svg {
  width: 20px;
  height: 20px;
  fill: #2AABEE;
  transition: transform 0.3s ease;
}

.tgfab__btn:hover svg {
  transform: scale(1.1);
}

/* Label text */
.tgfab__btn .tgfab__label {
  font-weight: 600;
  background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Badge nhỏ cho admin */
.tgfab__badge {
  position: absolute;
  top: -6px;
  right: -6px;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 20px;
  box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
  animation: badgePulse 1.5s ease-in-out infinite;
}

@keyframes badgePulse {
  0%, 100% {
    transform: scale(1);
    opacity: 1;
  }
  50% {
    transform: scale(1.1);
    opacity: 0.9;
  }
}

/* Tooltip nhỏ khi hover (PC) */
.tgfab__btn {
  position: relative;
}

/* Mobile: chuyển sang dạng speed-dial (nút tròn, ẩn nhãn) */
@media (max-width: 640px) {
  .tgfab__toggle {
    display: inline-flex;
  }
  
  .tgfab__actions {
    position: absolute;
    right: 0;
    bottom: calc(var(--tgfab-size) + var(--tgfab-gap));
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  
  .tgfab.is-open .tgfab__actions {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  
  .tgfab__btn {
    width: var(--tgfab-size);
    height: var(--tgfab-size);
    border-radius: 50%;
    padding: 0;
    justify-content: center;
    background: var(--tgfab-bg);
  }
  
  .tgfab__btn::before {
    display: none;
  }
  
  .tgfab__btn svg {
    width: 24px;
    height: 24px;
    fill: #fff;
  }
  
  .tgfab__btn .tgfab__label {
    display: none;
  }
  
  .tgfab__badge {
    top: -4px;
    right: -4px;
    font-size: 8px;
    padding: 2px 5px;
  }
}

/* Animation khi mở menu */
@keyframes tgfabSlideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.tgfab.is-open .tgfab__btn {
  animation: tgfabSlideUp 0.25s ease forwards;
}

.tgfab.is-open .tgfab__btn:nth-child(1) { animation-delay: 0.05s; }
.tgfab.is-open .tgfab__btn:nth-child(2) { animation-delay: 0.1s; }

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
  .tgfab__toggle,
  .tgfab__btn,
  .tgfab__actions {
    transition: none;
    animation: none;
  }
  
  @keyframes tgfabPulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(42, 171, 238, 0.4); }
    50% { box-shadow: 0 4px 20px rgba(42, 171, 238, 0.4); }
  }
}

<script>
(() => {
  const fab = document.querySelector('[data-tgfab]');
  if (!fab) return;
  
  const toggle = fab.querySelector('.tgfab__toggle');
  if (!toggle) return;
  
  // Toggle menu on mobile
  toggle.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = fab.classList.toggle('is-open');
    toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });
  
  // Close menu when clicking outside
  document.addEventListener('click', (e) => {
    if (!fab.contains(e.target)) {
      fab.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });
  
  // Close menu on ESC key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && fab.classList.contains('is-open')) {
      fab.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });
  
  // Handle window resize - close menu if screen becomes larger
  window.addEventListener('resize', () => {
    if (window.innerWidth > 640 && fab.classList.contains('is-open')) {
      fab.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });
})();
</script>

            if (!starsContainer) return;
            
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 0.5;
                star.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    width: ${size}px;
                    height: ${size}px;
                    --duration: ${Math.random() * 3 + 2}s;
                    --delay: ${Math.random() * 5}s;
                    --opacity: ${Math.random() * 0.6 + 0.3};
                `;
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Particles
        function initParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            
            const colors = ['#6366f1', '#a855f7', '#06b6d4', '#ec4899', '#10b981'];
            
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 3 + 1;
                particle.style.cssText = `
                    position: fixed;
                    width: ${size}px;
                    height: ${size}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    border-radius: 50%;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    opacity: ${Math.random() * 0.4 + 0.1};
                    filter: blur(1px);
                    pointer-events: none;
                    z-index: 999;
                    animation: floatParticle ${Math.random() * 15 + 10}s linear infinite;
                `;
                container.appendChild(particle);
            }
        }
        
        // Add particle animation style
        const particleStyle = document.createElement('style');
        particleStyle.textContent = `
            @keyframes floatParticle {
                0% { transform: translateY(0) translateX(0); opacity: 0; }
                10% { opacity: 0.6; }
                90% { opacity: 0.3; }
                100% { transform: translateY(-100vh) translateX(${Math.random() * 100 - 50}px); opacity: 0; }
            }
        `;
        document.head.appendChild(particleStyle);
        
        initParticles();

        // Original JavaScript functions - kept exactly the same
        function getDeviceName() {
            let ua = navigator.userAgent;
            let platform = navigator.platform || '';
            let device = '';
            if (/android/i.test(ua)) device = 'Android';
            else if (/iPad|iPhone|iPod/.test(ua)) device = 'iOS';
            else if (/windows/i.test(ua)) device = 'Windows';
            else if (/macintosh/i.test(ua)) device = 'MacOS';
            else if (/linux/i.test(ua)) device = 'Linux';
            else device = 'Other';
            let browser = '';
            if (ua.toLowerCase().indexOf("chrome") > -1) browser = 'Chrome';
            else if (ua.toLowerCase().indexOf("firefox") > -1) browser = 'Firefox';
            else if (ua.toLowerCase().indexOf("safari") > -1 && device.indexOf("iOS") == -1) browser = 'Safari';
            else if (ua.toLowerCase().indexOf("edge") > -1) browser = 'Edge';
            else browser = 'Other';
            let hash = btoa(ua + platform).substring(0,12);
            return device + ' ' + browser + ' (' + hash + ')';
        }

        // Khi click vào 1 game: thử login tự động
        function tryAutoAccess(gameId, name, img) {
            let device = getDeviceName();
            let savedKey = localStorage.getItem("game_key_" + gameId + "_" + device) || "";
            if (savedKey) {
                autoCheckKey(gameId, savedKey, device, name, img);
            } else {
                openKeyModal(gameId, name, img);
            }
        }

        function openKeyModal(id, name, img) {
            document.getElementById('gameId').value = id;
            document.getElementById('modalName').textContent = name;
            document.getElementById('modalImg').src = img;
            document.getElementById('keyMsg').style.display = 'none';
            document.getElementById('keyMsg').textContent = '';
            document.getElementById('gameKey').value = '';
            document.getElementById('keyModal').style.display = 'flex';
            setTimeout(()=>{document.getElementById('gameKey').focus()},200);
        }
        
        function closeKeyModal() {
            document.getElementById('keyModal').style.display = 'none';
        }

        // Khi submit form nhập key
        async function checkKey(e) {
            e.preventDefault();
            let game_id = document.getElementById('gameId').value;
            let key = document.getElementById('gameKey').value.trim();
            let device_name = getDeviceName();
            let msg = document.getElementById('keyMsg');
            msg.style.display = 'none';
            msg.textContent = '';
            let btn = document.querySelector('.modal-btn');
            btn.disabled = true; 
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang kiểm tra...';
            let res = await fetch('../api/check_key.php', {
                method: 'POST',
                headers: {'Content-Type':'application/x-www-form-urlencoded'},
                body: 'game_id='+encodeURIComponent(game_id)+'&key='+encodeURIComponent(key)+'&device_name='+encodeURIComponent(device_name)
            });
            let data = {};
            try { data = await res.json(); } catch(e) {}
            btn.disabled = false; 
            btn.innerHTML = '<i class="fas fa-arrow-right"></i> Vào Game';
            if (data.success) {
                // Lưu key vào localStorage cho device+game này
                localStorage.setItem("game_key_" + game_id + "_" + device_name, key);
                window.location.href = "play_game.php?game_id="+encodeURIComponent(game_id);
            } else {
                msg.style.display = 'block';
                msg.textContent = data.msg || 'Key không đúng hoặc đã hết hạn!';
            }
        }

        // Khi truy cập lại có key, xác thực luôn và vào thẳng game
        async function autoCheckKey(gameId, key, device, name, img) {
            let res = await fetch('../api/check_key.php', {
                method: 'POST',
                headers: {'Content-Type':'application/x-www-form-urlencoded'},
                body: 'game_id='+encodeURIComponent(gameId)+'&key='+encodeURIComponent(key)+'&device_name='+encodeURIComponent(device)
            });
            let data = {};
            try { data = await res.json(); } catch(e) {}
            if (data.success) {
                window.location.href = "play_game.php?game_id="+encodeURIComponent(gameId);
            } else {
                // Key đã hết hạn hoặc bị thu hồi, xóa khỏi localStorage và show modal nhập lại
                localStorage.removeItem("game_key_" + gameId + "_" + device);
                openKeyModal(gameId, name, img);
            }
        }

        // Đóng modal bằng phím Esc
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeKeyModal();
        });
        
        document.getElementById('keyModal').addEventListener('click', function(e){
            if(e.target === this) closeKeyModal();
        });
    </script>
</body>
</html>
