<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SunWin AI Tool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#000;overflow:hidden;height:100vh;width:100vw;}

#swFrame{position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:1;}

.tool{
  position:fixed;bottom:20px;right:16px;width:270px;
  background:linear-gradient(135deg,rgba(20,8,3,0.98),rgba(10,3,1,0.98));
  border-radius:18px;border:1px solid rgba(255,200,0,0.35);
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  z-index:2147483647;font-family:'Courier New',monospace;
  transition:opacity .2s;
}
.tool.hide{opacity:0;pointer-events:none;}
.tool.mini .body{display:none;}
.tool.mini{width:auto;border-radius:40px;}
.tool.mini .hdr{border-radius:40px;border-bottom:none;}

.hdr{
  padding:10px 13px;
  background:linear-gradient(135deg,rgba(255,200,0,0.12),rgba(255,120,0,0.05));
  border-radius:18px 18px 0 0;border-bottom:1px solid rgba(255,200,0,0.2);
  display:flex;align-items:center;justify-content:space-between;cursor:grab;
}
.hdr:active{cursor:grabbing;}
.htitle{display:flex;align-items:center;gap:7px;}
.htitle .ico{font-size:16px;}
.htitle .nm{
  font-size:12px;font-weight:900;letter-spacing:1px;
  background:linear-gradient(135deg,#ffd700,#ff8c00);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hbtns{display:flex;gap:6px;}
.hbtns button{
  width:22px;height:22px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.08);color:#ffd700;
  font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.hbtns button:hover{background:rgba(255,200,0,0.25);}

.body{padding:11px;}

/* STATUS */
.srow{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 10px;background:rgba(0,0,0,0.45);
  border-radius:10px;margin-bottom:9px;
}
.sdot{
  width:7px;height:7px;border-radius:50%;background:#f44;
  display:inline-block;margin-right:6px;
  animation:blink 1.5s infinite;
}
.sdot.on{background:#4f4;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{font-size:9px;color:rgba(255,255,255,.65);}
.sessid{font-size:11px;font-weight:bold;color:#ffd700;}

/* DICE */
.drow{display:flex;justify-content:center;gap:9px;margin-bottom:9px;}
.dbox{
  width:46px;height:46px;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,200,0,0.5);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:bold;color:#ffd700;
  transition:transform .2s;
}
.dbox.pop{animation:pop .3s ease-out;}
@keyframes pop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}

.trow{text-align:center;font-size:10px;color:rgba(255,255,255,.5);margin-bottom:7px;}
.tval{font-size:20px;font-weight:bold;color:#ff8c00;}

.rbadge{
  display:block;width:100%;text-align:center;
  padding:5px;border-radius:20px;font-size:13px;font-weight:bold;
  margin-bottom:9px;
}
.rtai{background:rgba(76,175,80,.18);color:#4caf50;border:1px solid #4caf5055;}
.rxiu{background:rgba(244,67,54,.18);color:#f44336;border:1px solid #f4433655;}
.rempty{background:rgba(255,255,255,.05);color:#555;border:1px solid #333;}

/* PREDICTION */
.pbox{
  background:linear-gradient(135deg,rgba(255,200,0,0.08),rgba(255,120,0,0.03));
  border:1px solid rgba(255,200,0,0.2);
  border-radius:10px;padding:8px;margin-bottom:9px;text-align:center;
}
.plbl{font-size:8px;color:rgba(255,255,255,.4);letter-spacing:1px;margin-bottom:4px;}
.pval{font-size:26px;font-weight:900;letter-spacing:2px;}
.ptai{color:#4caf50;text-shadow:0 0 12px rgba(76,175,80,.5);}
.pxiu{color:#f44336;text-shadow:0 0 12px rgba(244,67,54,.5);}
.pwait{color:#444;}
.cbar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:5px;overflow:hidden;}
.cfill{height:100%;background:linear-gradient(90deg,#ffd700,#ff8c00);transition:width .5s;width:0%;}
.ctxt{font-size:8px;color:rgba(255,255,255,.3);margin-top:3px;}

/* STATS */
.strow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:9px;}
.stcard{background:rgba(0,0,0,.4);border-radius:8px;padding:5px;text-align:center;}
.stlbl{font-size:8px;color:rgba(255,255,255,.4);}
.stval{font-size:13px;font-weight:bold;color:#ffd700;}

/* LOG */
.logbox{
  font-size:8px;color:#f0c420;
  padding:5px 8px;background:rgba(0,0,0,.5);
  border-left:2px solid #f0c420;border-radius:5px;
  margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-height:24px;
}

/* HISTORY */
.hrow{display:flex;gap:4px;justify-content:center;margin-bottom:9px;}
.hitem{
  width:26px;height:26px;border-radius:6px;
  font-size:11px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
}
.htai{background:rgba(76,175,80,.18);border:1px solid #4caf5055;color:#4caf50;}
.hxiu{background:rgba(244,67,54,.18);border:1px solid #f4433655;color:#f44336;}
.hempty{background:rgba(255,255,255,.04);border:1px solid #1a1a1a;color:#333;}

/* BUTTONS */
.btnrow{display:flex;gap:6px;}
.rbtn{
  flex:1;background:linear-gradient(135deg,#ffd700,#ff8c00);
  border:none;padding:7px;border-radius:20px;
  font-size:10px;font-weight:bold;color:#1a0a00;cursor:pointer;
}
.rbtn:active{transform:scale(.97);}
.ibtn{
  flex:1;background:rgba(255,200,0,.12);
  border:1px solid rgba(255,200,0,.35);color:#ffd700;
  padding:7px;border-radius:20px;font-size:10px;cursor:pointer;
}
.ibtn:active{transform:scale(.97);}

.foot{
  display:flex;justify-content:space-between;
  padding-top:7px;margin-top:6px;
  border-top:1px solid rgba(255,255,255,.06);
  font-size:8px;
}
.ftime{color:rgba(255,200,0,.4);}
.fver{color:rgba(255,255,255,.18);}
</style>
</head>
<body>

<iframe id="swFrame" src="https://web.sunwin.qa"
  allow="accelerometer;autoplay;encrypted-media;gyroscope"
  allowfullscreen></iframe>

<div class="tool" id="tool">
  <div class="hdr" id="hdr">
    <div class="htitle">
      <span class="ico">🎲</span>
      <span class="nm">SUNWIN AI</span>
    </div>
    <div class="hbtns">
      <button id="mbtn">−</button>
      <button id="cbtn">✕</button>
    </div>
  </div>

  <div class="body">
    <div class="srow">
      <div>
        <span class="sdot" id="sdot"></span>
        <span class="stxt" id="stxt">Đang kết nối...</span>
      </div>
      <span class="sessid" id="sessid">#------</span>
    </div>

    <div class="drow">
      <div class="dbox" id="d1">?</div>
      <div class="dbox" id="d2">?</div>
      <div class="dbox" id="d3">?</div>
    </div>

    <div class="trow">Tổng: <span class="tval" id="tval">--</span></div>

    <span class="rbadge rempty" id="rbadge">---</span>

    <div class="pbox">
      <div class="plbl">🤖 DỰ ĐOÁN TIẾP THEO</div>
      <div class="pval pwait" id="pval">--</div>
      <div class="cbar"><div class="cfill" id="cfill"></div></div>
      <div class="ctxt" id="ctxt">Độ tin cậy: --%</div>
    </div>

    <div class="strow">
      <div class="stcard"><div class="stlbl">🟢 Tài</div><div class="stval" id="sc-tai">0</div></div>
      <div class="stcard"><div class="stlbl">🔴 Xỉu</div><div class="stval" id="sc-xiu">0</div></div>
      <div class="stcard"><div class="stlbl">🔥 Chuỗi</div><div class="stval" id="sc-str">0</div></div>
    </div>

    <div class="logbox" id="logbox">⚡ Đang khởi động...</div>

    <div class="hrow" id="hrow"></div>

    <div class="btnrow">
      <button class="rbtn" onclick="manualRefresh()">⟳ LÀM MỚI</button>
      <button class="ibtn" onclick="injectNow()">🔌 INJECT</button>
    </div>

    <div class="foot">
      <span class="ftime" id="ftime">--:--:--</span>
      <span class="fver">v6.0 · WS-HOOK</span>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let localHist  = JSON.parse(localStorage.getItem('sw_hist') || '[]');
let lastSess   = localStorage.getItem('sw_last_sess') || '';
let taiCount   = 0, xiuCount = 0, streak = 0, lastResult = '';
let injected   = false;
let isDrag     = false, ox = 0, oy = 0;

// ════════════════════════════════════════
//  DOM
// ════════════════════════════════════════
const $  = id => document.getElementById(id);
const log = m  => { $('logbox').textContent = m; console.log('[SW]', m); };

function setDot(on){
  $('sdot').className = 'sdot' + (on ? ' on' : '');
  $('stxt').textContent = on ? '✅ Đã kết nối' : '⏳ Đang kết nối...';
}

// ════════════════════════════════════════
//  DRAG
// ════════════════════════════════════════
const tool = $('tool'), hdr = $('hdr');
hdr.addEventListener('mousedown', e => {
  if(e.target.closest('.hbtns')) return;
  isDrag = true;
  const r = tool.getBoundingClientRect();
  ox = e.clientX - r.left; oy = e.clientY - r.top;
  tool.style.right = 'auto'; tool.style.bottom = 'auto';
  tool.style.left = r.left + 'px'; tool.style.top = r.top + 'px';
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if(!isDrag) return;
  let x = e.clientX-ox, y = e.clientY-oy;
  x = Math.max(0, Math.min(window.innerWidth - tool.offsetWidth, x));
  y = Math.max(0, Math.min(window.innerHeight - tool.offsetHeight, y));
  tool.style.left = x+'px'; tool.style.top = y+'px';
});
document.addEventListener('mouseup', () => isDrag = false);

hdr.addEventListener('touchstart', e => {
  if(e.target.closest('.hbtns')) return;
  const r = tool.getBoundingClientRect(), t = e.touches[0];
  ox = t.clientX-r.left; oy = t.clientY-r.top;
  tool.style.right='auto'; tool.style.bottom='auto';
  tool.style.left=r.left+'px'; tool.style.top=r.top+'px';
},{passive:true});
document.addEventListener('touchmove', e => {
  if(!isDrag) return;
  const t = e.touches[0];
  let x = t.clientX-ox, y = t.clientY-oy;
  x = Math.max(0, Math.min(window.innerWidth-tool.offsetWidth, x));
  y = Math.max(0, Math.min(window.innerHeight-tool.offsetHeight, y));
  tool.style.left=x+'px'; tool.style.top=y+'px';
},{passive:true});
document.addEventListener('touchend', () => isDrag = false);

// Controls
$('mbtn').onclick = () => {
  tool.classList.toggle('mini');
  $('mbtn').textContent = tool.classList.contains('mini') ? '+' : '−';
};
$('cbtn').onclick = () => tool.classList.add('hide');
hdr.addEventListener('dblclick', () => {
  tool.classList.toggle('mini');
  $('mbtn').textContent = tool.classList.contains('mini') ? '+' : '−';
});

// ════════════════════════════════════════
//  UPDATE UI
// ════════════════════════════════════════
function updateUI(session, dice, total, result) {
  $('sessid').textContent = '#' + session;

  // Dice với animation
  ['d1','d2','d3'].forEach((id, i) => {
    const el = $(id);
    el.classList.remove('pop');
    void el.offsetWidth;
    el.textContent = dice[i] || '?';
    el.classList.add('pop');
  });

  $('tval').textContent = total || '--';

  const badge = $('rbadge');
  if(result === 'Tài'){
    badge.textContent = '🟢 TÀI';
    badge.className = 'rbadge rtai';
  } else if(result === 'Xỉu'){
    badge.textContent = '🔴 XỈU';
    badge.className = 'rbadge rxiu';
  }

  // Stats
  if(result && result !== lastResult){
    if(result === 'Tài') taiCount++;
    else xiuCount++;
    streak = (result === lastResult) ? streak+1 : 1;
    lastResult = result;
  }
  $('sc-tai').textContent = taiCount;
  $('sc-xiu').textContent = xiuCount;
  $('sc-str').textContent = streak;

  setDot(true);
}

// ════════════════════════════════════════
//  HISTORY
// ════════════════════════════════════════
function addToHist(result, dice, total, session){
  localHist.unshift({r:result, dice, total, s:session, ts:Date.now()});
  if(localHist.length > 30) localHist.pop();
  localStorage.setItem('sw_hist', JSON.stringify(localHist));
  renderHist();
}

function renderHist(){
  const c = $('hrow'); c.innerHTML = '';
  const arr = localHist.slice(0,8);
  while(arr.length < 8) arr.push(null);
  arr.forEach(item => {
    const d = document.createElement('div');
    if(!item){ d.className='hitem hempty'; d.textContent='?'; }
    else if(item.r==='Tài'){ d.className='hitem htai'; d.textContent='T'; }
    else { d.className='hitem hxiu'; d.textContent='X'; }
    c.appendChild(d);
  });
}

// ════════════════════════════════════════
//  PREDICTION LOCAL (không cần API)
//  Dùng thuật toán phân tích chuỗi
// ════════════════════════════════════════
function calcPrediction(){
  if(localHist.length < 3) return;
  const results = localHist.map(h => h.r);
  let tai=0, xiu=0;

  // Đếm 10 phiên gần nhất
  const recent = results.slice(0,10);
  recent.forEach(r => { if(r==='Tài') tai++; else xiu++; });

  // Phân tích chuỗi
  let streak = 1;
  for(let i=1; i<Math.min(results.length,5); i++){
    if(results[i]===results[0]) streak++;
    else break;
  }

  // Tính xác suất
  let pred, conf;
  if(streak >= 4){
    // Chuỗi dài → có khả năng đảo chiều
    pred = results[0]==='Tài' ? 'Xỉu' : 'Tài';
    conf = Math.min(55 + streak*3, 75);
  } else if(tai > xiu + 2){
    pred = 'Xỉu'; conf = 55 + (tai-xiu)*3;
  } else if(xiu > tai + 2){
    pred = 'Tài'; conf = 55 + (xiu-tai)*3;
  } else {
    // Ngẫu nhiên gần 50/50
    pred = results[0]==='Tài' ? 'Xỉu' : 'Tài';
    conf = 52;
  }
  conf = Math.min(conf, 82);

  const el = $('pval');
  el.textContent = pred;
  el.className = 'pval ' + (pred==='Tài' ? 'ptai' : 'pxiu');
  $('cfill').style.width = conf + '%';
  $('ctxt').textContent = 'Độ tin cậy: ' + conf + '%';
}

// ════════════════════════════════════════
//  XỬ LÝ DỮ LIỆU MỚI
// ════════════════════════════════════════
function onNewData(session, dice, total, result){
  const sessStr = String(session);
  if(sessStr === lastSess) return; // Bỏ qua nếu đã xử lý

  log('📥 #' + session + ': ' + result + ' (' + dice.join(',') + '=' + total + ')');
  lastSess = sessStr;
  localStorage.setItem('sw_last_sess', sessStr);

  updateUI(session, dice, total, result);
  addToHist(result, dice, total, session);
  calcPrediction();
}

// ════════════════════════════════════════
//  PARSE DATA — nhiều định dạng khác nhau
// ════════════════════════════════════════
function tryParse(raw){
  try {
    const d = typeof raw === 'string' ? JSON.parse(raw) : raw;

    // Dạng 1: WebSocket game message
    // {type:"result", session:123, dice:[1,2,3], total:6, result:"Xỉu"}
    if(d.type && (d.type.includes('result') || d.type.includes('game') || d.type.includes('round'))){
      const session = d.session || d.roundId || d.round_id || d.phien;
      const dice    = d.dice || d.xucxac || d.dices || [d.dice1,d.dice2,d.dice3];
      const total   = d.total || d.tong || (dice ? dice[0]+dice[1]+dice[2] : 0);
      const result  = normalizeResult(d.result || d.ketqua || d.winner || (total>=11?'Tài':'Xỉu'));
      if(session && dice && dice.length===3 && result){
        return {session, dice, total, result};
      }
    }

    // Dạng 2: Generic data object
    const tryFields = (obj) => {
      const get = (...names) => {
        for(const n of names)
          for(const k of Object.keys(obj||{}))
            if(k.toLowerCase()===n.toLowerCase()) return obj[k];
        return undefined;
      };
      const session = get('session','phien','roundId','round_id','id','round');
      const d1 = Number(get('dice1','xuc_xac_1','xucxac1','d1') || 0);
      const d2 = Number(get('dice2','xuc_xac_2','xucxac2','d2') || 0);
      const d3 = Number(get('dice3','xuc_xac_3','xucxac3','d3') || 0);
      const dice = [d1,d2,d3];
      let total = Number(get('total','tong','sum') || 0);
      if(!total && d1&&d2&&d3) total = d1+d2+d3;
      const rawR = get('result','ketqua','ket_qua','winner','outcome');
      let result = normalizeResult(rawR);
      if(!result && total>=3) result = total>=11?'Tài':'Xỉu';
      if(session && (d1||d2||d3) && result) return {session:Number(session),dice,total,result};
      return null;
    };

    // Thử trực tiếp
    const r1 = tryFields(d);
    if(r1) return r1;

    // Thử nested: data.result, data.game, data.current, v.v.
    for(const key of ['result','game','current','data','payload','body','msg']){
      if(d[key] && typeof d[key]==='object'){
        const r2 = tryFields(d[key]);
        if(r2) return r2;
        // Thử array
        if(Array.isArray(d[key]) && d[key][0]){
          const r3 = tryFields(d[key][0]);
          if(r3) return r3;
        }
      }
    }
  } catch(_){}
  return null;
}

function normalizeResult(raw){
  if(!raw) return null;
  const s = String(raw).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(/tai/.test(s)) return 'Tài';
  if(/xiu|xu/.test(s)) return 'Xỉu';
  if(/big|over|high/.test(s)) return 'Tài';
  if(/small|under|low/.test(s)) return 'Xỉu';
  return null;
}

// ════════════════════════════════════════
//  INJECT VÀO IFRAME
// ════════════════════════════════════════
function injectNow(){
  const frame = $('swFrame');
  if(!frame){ log('❌ Không tìm thấy iframe'); return; }

  let fw;
  try { fw = frame.contentWindow; }
  catch(e){ log('❌ Không truy cập được iframe (CORS)'); return; }
  if(!fw){ log('⏳ Iframe chưa sẵn sàng, thử lại...'); return; }

  // Dùng postMessage để nhận data từ iframe
  window.addEventListener('message', e => {
    if(!e.data) return;
    const parsed = tryParse(e.data);
    if(parsed) onNewData(parsed.session, parsed.dice, parsed.total, parsed.result);
  });

  // Code inject vào iframe — hook WebSocket + XHR + fetch
  const hookCode = `(function(){
    if(window.__SW_HOOKED__) return;
    window.__SW_HOOKED__ = true;

    function relay(data){
      try{ window.parent.postMessage(data, '*'); } catch(_){}
    }

    // ── Hook WebSocket ──
    const _WS = window.WebSocket;
    window.WebSocket = function(...args){
      const ws = new _WS(...args);
      ws.addEventListener('message', function(e){
        try{ relay(e.data); } catch(_){}
      });
      return ws;
    };
    Object.assign(window.WebSocket, _WS);

    // ── Hook fetch ──
    const _fetch = window.fetch;
    window.fetch = async function(...args){
      const res = await _fetch(...args);
      try{
        const url = String(args[0]||'');
        if(url.includes('game') || url.includes('round') || url.includes('result') || url.includes('dice') || url.includes('history')){
          const clone = res.clone();
          clone.text().then(t => { try{ relay(t); }catch(_){} });
        }
      }catch(_){}
      return res;
    };

    // ── Hook XMLHttpRequest ──
    const _XHR = window.XMLHttpRequest;
    window.XMLHttpRequest = function(){
      const xhr = new _XHR();
      const origOpen = xhr.open.bind(xhr);
      xhr.open = function(method, url, ...rest){
        xhr._url = url;
        return origOpen(method, url, ...rest);
      };
      xhr.addEventListener('load', function(){
        try{
          const url = String(xhr._url||'');
          if(url.includes('game')||url.includes('round')||url.includes('result')||url.includes('dice')||url.includes('history')){
            relay(xhr.responseText);
          }
        }catch(_){}
      });
      return xhr;
    };

    console.log('[SunWin Hook] ✅ Đã inject WS + fetch + XHR hook');
  })();`;

  try {
    fw.eval(hookCode);
    injected = true;
    setDot(true);
    log('✅ Inject thành công! Vào bàn Tài Xỉu để bắt dữ liệu');
