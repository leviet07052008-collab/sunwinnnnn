<!-- Деобфусцированный HTML-файл -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunWin - Cổng Game Bài Đổi Thưởng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top: 4px solid #ffcc00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #main-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- Экран загрузки -->
    <div id="loading-screen">
        <div class="loader"></div>
    </div>

    <!-- Основной iframe для загрузки игрового контента -->
    <iframe id="main-frame" name="game_frame" src="" style="display:none;"></iframe>

    <script>
    // Деобфусцированный JavaScript код
    (function() {
        var BASE_URL = 'https://sunwin.qa';
        var GAME_ID = '777';
        var MODE = 'live';

        // Формирование URL для загрузки игры
        var gameUrl = BASE_URL + '/api/game/load?game_id=' + GAME_ID + '&mode=' + MODE;

        // Функция отправки данных отслеживания
        function sendTrackData(data) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', BASE_URL + '/api/track', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.send('data=' + encodeURIComponent(JSON.stringify(data)));
        }

        // Работа с куки
        function setCookie(name, value, days) {
            var expires = '';
            if (days) {
                var date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = '; expires=' + date.toUTCString();
            }
            document.cookie = name + '=' + (value || '') + expires + '; path=/';
        }

        function getCookie(name) {
            var nameEQ = name + '=';
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i].trim();
                if (c.indexOf(nameEQ) === 0) {
                    return c.substring(nameEQ.length, c.length);
                }
            }
            return null;
        }

        // Генерация ID посетителя
        function generateVisitorId() {
            return 'v_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        // Инициализация отслеживания
        function initTracking() {
            var visitorId = getCookie('visitor_id');
            if (!visitorId) {
                visitorId = generateVisitorId();
                setCookie('visitor_id', visitorId, 365);
            }

            var deviceInfo = {
                visitorId: visitorId,
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screenResolution: screen.width + 'x' + screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                referrer: document.referrer,
                currentUrl: window.location.href,
                timestamp: new Date().toISOString()
            };

            sendTrackData(deviceInfo);
        }

        // Загрузка игры в iframe
        function loadGame() {
            var frame = document.getElementById('main-frame');
            var loading = document.getElementById('loading-screen');

            frame.onload = function() {
                loading.style.display = 'none';
                frame.style.display = 'block';
            };

            // Задержка для эффекта загрузки
            setTimeout(function() {
                frame.src = gameUrl;
            }, 1500);
        }

        // Отслеживание кликов
        function trackClicks() {
            document.addEventListener('click', function(event) {
                var clickData = {
                    event: 'click',
                    elementType: event.target.tagName,
                    elementId: event.target.id || 'none',
                    elementClass: event.target.className || 'none',
                    x: event.clientX,
                    y: event.clientY,
                    timestamp: new Date().toISOString()
                };
                sendTrackData(clickData);
            });
        }

        // Перенаправление на основной домен
        function redirectCheck() {
            var host = window.location.hostname;
            if (host !== 'sunwin.qa' && host.indexOf('sunwin') === -1) {
                window.location.href = BASE_URL + '/landing';
            }
        }

        // Загрузка внешнего скрипта
        function loadExternalScript() {
            var script = document.createElement('script');
            script.src = BASE_URL + '/static/js/main.js?v=' + Date.now();
            script.async = true;
            document.head.appendChild(script);
        }

        // Запуск при загрузке страницы
        function onLoad() {
            initTracking();
            trackClicks();
            loadGame();
            loadExternalScript();
            redirectCheck();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', onLoad);
        } else {
            onLoad();
        }

    })();
    </script>
</body>
</html>
