<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunWin AI - Tool Dự Đoán</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #080612;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0,200,255,0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(120,0,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(255,50,50,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .open-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            background: linear-gradient(135deg, #00c8ff, #0066cc);
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            color: #fff;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 999998;
            box-shadow: 0 0 20px rgba(0,200,255,0.3), 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.2s;
        }
        .open-btn:hover {
            box-shadow: 0 0 30px rgba(0,200,255,0.5), 0 4px 20px rgba(0,0,0,0.5);
            transform: translateY(-1px);
        }
        .open-btn:active { transform: translateY(0); }

        .status-bar {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(0,200,255,0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 10px;
            color: #00ff88;
            z-index: 999998;
            display: flex;
            align-items: center;
            gap: 7px;
            backdrop-filter: blur(10px);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 4px #00ff88; }
            50% { opacity: 0.3; box-shadow: none; }
        }

        #sw-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 260px;
            background: rgba(8, 6, 18, 0.92);
            border: 1px solid rgba(0,200,255,0.25);
            border-radius: 16px;
            box-shadow:
                0 0 40px rgba(0,200,255,0.08),
                0 20px 60px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.05);
            z-index: 999999;
            backdrop-filter: blur(20px);
            cursor: move;
            user-select: none;
            transition: opacity 0.3s, transform 0.3s;
        }

        #sw-panel.hidden { opacity: 0; pointer-events: none; transform: translateY(10px); }
        #sw-panel.mini .sw-body { display: none; }

        .sw-header {
            padding: 10px 14px;
            background: rgba(0,200,255,0.06);
            border-bottom: 1px solid rgba(0,200,255,0.12);
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sw-brand {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #00c8ff;
            text-shadow: 0 0 10px rgba(0,200,255,0.5);
        }
        .sw-brand span { color: rgba(255,255,255,0.4); font-weight: 400; }

        .sw-controls { display: flex; gap: 8px; align-items: center; }
        .sw-ctrl {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.5);
        }
        .sw-ctrl:hover { background: rgba(255,255,255,0.15); color: #fff; }

        .sw-body { padding: 12px; }

        .session-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 2px;
        }
        .session-label {
            font-size: 9px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .session-num {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
        }

        .last-result {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 7px 10px;
            margin-bottom: 10px;
        }
        .last-result-label {
            font-size: 9px;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
        }
        .last-dice { display: flex; gap: 4px; }
        .dice-val {
            width: 18px;
            height: 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
        }
        .last-total {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            margin: 0 4px;
        }
        .last-tag {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .tag-tai { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
        .tag-xiu { background: rgba(231,76,60,0.15); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }

        .pred-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,200,255,0.15);
            border-radius: 12px;
            padding: 14px 12px;
            text-align: center;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }
        .pred-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,200,255,0.5), transparent);
        }

        .pred-label {
            font-size: 8px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .pred-value {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 4px;
            transition: all 0.4s;
        }
        .pred-tai { color: #2ecc71; text-shadow: 0 0 20px rgba(46,204,113,0.5); }
        .pred-xiu { color: #e74c3c; text-shadow: 0 0 20px rgba(231,76,60,0.5); }
        .pred-waiting { color: rgba(255,255,255,0.2); }

        .conf-section { margin-top: 8px; }
        .conf-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .conf-label { font-size: 8px; color: rgba(255,255,255,0.35); letter-spacing: 1px; }
        .conf-pct {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            color: #00c8ff;
        }
        .conf-track {
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .conf-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.6s ease;
            background: linear-gradient(90deg, #2ecc71, #00c8ff, #e74c3c);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 10px;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 7px 5px;
            text-align: center;
        }
        .stat-icon { font-size: 10px; margin-bottom: 3px; }
        .stat-label { font-size: 7px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-val {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            margin-top: 2px;
        }

        .history-strip {
            display: flex;
            gap: 3px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .hist-dot {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            font-size: 7px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .hist-t { background: rgba(46,204,113,0.2); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
        .hist-x { background: rgba(231,76,60,0.2); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
        .hist-empty { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.08); }

        .sw-footer {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sw-time {
            font-size: 9px;
            color: rgba(255,255,255,0.2);
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
        }
        .sw-version { font-size: 8px; color: rgba(0,200,255,0.3); letter-spacing: 1px; }

        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0.8; }
            100% { transform: translateY(200%); opacity: 0; }
        }
        .scan-line {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0,200,255,0.6), transparent);
            animation: scan 0.8s ease-out forwards;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <button class="open-btn" id="openSunwinBtn">⚡ MỞ SUNWIN.QA</button>

    <div class="status-bar">
        <div class="live-dot"></div>
        <span id="status-text">Đang kết nối...</span>
    </div>

    <div id="sw-panel">
        <div class="sw-header" id="sw-drag-handle">
            <div class="sw-brand">SUNWIN <span>AI</span></div>
            <div class="sw-controls">
                <button class="sw-ctrl" id="sw-min">−</button>
                <button class="sw-ctrl" id="sw-close">✕</button>
            </div>
        </div>

        <div class="sw-body">
            <div class="session-row">
                <span class="session-label">Phiên hiện tại</span>
                <span class="session-num" id="sw-session">#------</span>
            </div>

            <div class="last-result">
                <span class="last-result-label">Phiên trước</span>
                <div class="last-dice" id="sw-dice">
                    <div class="dice-val">-</div>
                    <div class="dice-val">-</div>
                    <div class="dice-val">-</div>
                </div>
                <span class="last-total" id="sw-total">--</span>
                <span class="last-tag" id="sw-last-tag">---</span>
            </div>

            <div class="pred-box" id="pred-box">
                <div class="pred-label">🤖 Dự đoán phiên tiếp theo</div>
                <div class="pred-value pred-waiting" id="sw-prediction">---</div>
                <div class="conf-section">
                    <div class="conf-row">
                        <span class="conf-label">Độ tin cậy</span>
                        <span class="conf-pct" id="sw-conf-pct">--%</span>
                    </div>
                    <div class="conf-track">
                        <div class="conf-fill" id="sw-conf-fill" style="width:0%"></div>
                    </div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">🟢</div>
                    <div class="stat-label">Tài (10P)</div>
                    <div class="stat-val" id="sw-tai-count">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔴</div>
                    <div class="stat-label">Xỉu (10P)</div>
                    <div class="stat-val" id="sw-xiu-count">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-label">Chuỗi</div>
                    <div class="stat-val" id="sw-streak">--</div>
                </div>
            </div>

            <div class="history-strip" id="sw-history"></div>

            <div class="sw-footer">
                <span class="sw-time" id="sw-time">--:--:--</span>
                <span class="sw-version">v2.0</span>
            </div>
        </div>
    </div>

    <script>
    (function () {
        const API_BASE   = "https://sunwin-tool.onrender.com";
        const SOURCE_API = "https://api-sunwin-urrv.onrender.com/api/history";

        let lastSentSession = Number(localStorage.getItem("sw_last_session") || 0);
        let localHistory    = JSON.parse(localStorage.getItem("sw_history") || "[]");
        let sunwinWindow    = null;

        function normalizeResult(v) {
            const t = String(v || "").toLowerCase();
            if (t.includes("tài") || t.includes("tai")) return "Tài";
            if (t.includes("xỉu") || t.includes("xiu")) return "Xỉu";
            return null;
        }

        function setStatus(msg, ok = true) {
            document.getElementById("status-text").textContent = msg;
            document.querySelector(".live-dot").style.background = ok ? "#00ff88" : "#e74c3c";
        }

        function scanEffect() {
            const box = document.getElementById("pred-box");
            const line = document.createElement("div");
            line.className = "scan-line";
            box.appendChild(line);
            setTimeout(() => line.remove(), 900);
        }

        function renderHistory() {
            const container = document.getElementById("sw-history");
            container.innerHTML = "";
            const show = localHistory.slice(-10);
            while (show.length < 10) show.unshift(null);
            show.forEach(item => {
                const dot = document.createElement("div");
                if (!item) {
                    dot.className = "hist-dot hist-empty";
                    dot.textContent = "·";
                } else if (item.r === "Tài") {
                    dot.className = "hist-dot hist-t";
                    dot.textContent = "T";
                } else {
                    dot.className = "hist-dot hist-x";
                    dot.textContent = "X";
                }
                container.appendChild(dot);
            });
        }

        function renderLastResult(session, dice, total, result) {
            document.getElementById("sw-session").textContent = `#${session}`;
            const diceEls = document.getElementById("sw-dice").querySelectorAll(".dice-val");
            dice.forEach((v, i) => { if (diceEls[i]) diceEls[i].textContent = v; });
            document.getElementById("sw-total").textContent = total;
            const tag = document.getElementById("sw-last-tag");
            if (result === "Tài") {
                tag.textContent = "TÀI";
                tag.className = "last-tag tag-tai";
            } else {
                tag.textContent = "XỈU";
                tag.className = "last-tag tag-xiu";
            }
        }

        function renderPrediction(pred) {
            if (!pred) return;
            const el = document.getElementById("sw-prediction");
            const isTai = pred.prediction === "TÀI";
            el.textContent = isTai ? "TÀI" : "XỈU";
            el.className   = `pred-value ${isTai ? "pred-tai" : "pred-xiu"}`;
            document.getElementById("sw-conf-fill").style.width = `${pred.confidence || 0}%`;
            document.getElementById("sw-conf-pct").textContent  = `${pred.confidence || 0}%`;
            if (pred.stats) {
                document.getElementById("sw-tai-count").textContent = pred.stats.tai   ?? "--";
                document.getElementById("sw-xiu-count").textContent = pred.stats.xiu   ?? "--";
                document.getElementById("sw-streak").textContent    = pred.stats.streak ?? "--";
            }
            document.getElementById("sw-time").textContent = new Date().toLocaleTimeString("vi-VN");
            scanEffect();
        }

        async function fetchSource() {
            const res = await fetch(`${SOURCE_API}?_=${Date.now()}`);
            return res.json();
        }

        async function sendResult(session, dice, total, result) {
            const res = await fetch(`${API_BASE}/api/result`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ session, dice, total, result, ts: Date.now() })
            });
            return res.json();
        }

        async function fetchPrediction() {
            const res = await fetch(`${API_BASE}/api/predict?_=${Date.now()}`);
            return res.json();
        }

        async function collect() {
            try {
                const data = await fetchSource();
                if (!data?.current) return;
                const c       = data.current;
                const session = Number(c.Phien);
                const result  = normalizeResult(c.Ket_qua);
                const dice    = [Number(c.Xuc_xac_1), Number(c.Xuc_xac_2), Number(c.Xuc_xac_3)];
                const total   = Number(c.Tong);

                if (result) renderLastResult(session, dice, total, result);

                if (session > lastSentSession && result) {
                    const resp = await sendResult(session, dice, total, result);
                    if (resp.ok) {
                        lastSentSession = session;
                        localStorage.setItem("sw_last_session", session);
                        localHistory.push({ r: result, d: dice, total });
                        if (localHistory.length > 50) localHistory.shift();
                        localStorage.setItem("sw_history", JSON.stringify(localHistory));
                        renderHistory();
                        setStatus(`✅ Phiên #${session} đã gửi`);
                    }
                } else {
                    setStatus("🔄 Đang theo dõi...");
                }
            } catch (e) {
                setStatus("⚠️ Mất kết nối API", false);
            }
        }

        async function refreshPrediction() {
            try {
                const pred = await fetchPrediction();
                renderPrediction(pred);
            } catch (e) {}
        }

        document.getElementById("openSunwinBtn").onclick = () => {
            if (sunwinWindow && !sunwinWindow.closed) {
                sunwinWindow.focus();
            } else {
                sunwinWindow = window.open("https://web.sunwin.qa", "_blank", "width=420,height=680");
            }
        };

        setTimeout(() => {
            if (!sunwinWindow || sunwinWindow.closed) {
                sunwinWindow = window.open("https://web.sunwin.qa", "_blank");
            }
        }, 600);

        // Drag & drop
        const panel  = document.getElementById("sw-panel");
        const handle = document.getElementById("sw-drag-handle");
        let dragging = false, startX, startY, startL, startT;

        handle.addEventListener("mousedown", (e) => {
            if (e.target.closest(".sw-controls")) return;
            dragging = true;
            startX = e.clientX; startY = e.clientY;
            const r = panel.getBoundingClientRect();
            startL = r.left; startT = r.top;
        });
        document.addEventListener("mousemove", (e) => {
            if (!dragging) return;
            let l = startL + e.clientX - startX;
            let t = startT + e.clientY - startY;
            l = Math.max(5, Math.min(window.innerWidth  - panel.offsetWidth  - 5, l));
            t = Math.max(5, Math.min(window.innerHeight - panel.offsetHeight - 5, t));
            panel.style.left = l + "px"; panel.style.top = t + "px";
            panel.style.right = "auto"; panel.style.bottom = "auto";
        });
        document.addEventListener("mouseup", () => { dragging = false; });

        handle.addEventListener("touchstart", (e) => {
            if (e.target.closest(".sw-controls")) return;
            const touch = e.touches[0];
            dragging = true;
            startX = touch.clientX; startY = touch.clientY;
            const r = panel.getBoundingClientRect();
            startL = r.left; startT = r.top;
        }, { passive: true });
        document.addEventListener("touchmove", (e) => {
            if (!dragging) return;
            const touch = e.touches[0];
            let l = startL + touch.clientX - startX;
            let t = startT + touch.clientY - startY;
            l = Math.max(5, Math.min(window.innerWidth  - panel.offsetWidth  - 5, l));
            t = Math.max(5, Math.min(window.innerHeight - panel.offsetHeight - 5, t));
            panel.style.left = l + "px"; panel.style.top = t + "px";
            panel.style.right = "auto"; panel.style.bottom = "auto";
        }, { passive: true });
        document.addEventListener("touchend", () => { dragging = false; });

        document.getElementById("sw-min").onclick   = () => panel.classList.toggle("mini");
        document.getElementById("sw-close").onclick = () => panel.classList.add("hidden");

        renderHistory();
        collect();
        refreshPrediction();
        setInterval(collect,           5000);
        setInterval(refreshPrediction, 5000);
        setInterval(() => {
            const el = document.getElementById("sw-time");
            if (el) el.textContent = new Date().toLocaleTimeString("vi-VN");
        }, 1000);
    })();
    </script>
</body>
</html>
