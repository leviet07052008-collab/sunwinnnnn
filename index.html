<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SunWin Predictor - Floating Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        /* IFRAME FULL MÀN HÌNH */
        #fullscreen-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            background: #000;
            z-index: 1;
        }

        /* MENU DI CHUYỂN ĐƯỢC - NHỎ GÓC */
        .floating-panel {
            position: fixed;
            z-index: 9999;
            width: 260px;
            background: rgba(10, 20, 30, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid #00ffcc88;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            font-family: 'Courier New', monospace;
            color: #00ffcc;
            font-size: 12px;
            cursor: move;
            transition: box-shadow 0.1s;
            resize: both;
            overflow: hidden;
        }

        .floating-panel:active {
            cursor: grabbing;
            box-shadow: 0 0 15px cyan;
        }

        /* HEADER CỦA MENU (KÉO THẢ) */
        .drag-handle {
            background: #0a2a2f;
            padding: 8px 10px;
            border-radius: 16px 16px 0 0;
            font-weight: bold;
            font-size: 13px;
            text-align: center;
            letter-spacing: 1px;
            cursor: grab;
            border-bottom: 1px solid #2faa99;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        .close-btn {
            background: #aa3355;
            border: none;
            color: white;
            border-radius: 20px;
            width: 22px;
            height: 22px;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
        }
        .close-btn:hover {
            background: red;
        }

        /* NỘI DUNG BÊN TRONG */
        .menu-content {
            padding: 10px;
            cursor: auto;
            max-height: 380px;
            overflow-y: auto;
            font-size: 11px;
        }

        .stats-row {
            background: #031016;
            margin: 6px 0;
            padding: 6px;
            border-radius: 12px;
            border-left: 3px solid #0ff;
        }
        .prediction {
            background: #021118;
            text-align: center;
            padding: 8px;
            border-radius: 20px;
            margin: 8px 0;
            font-weight: bold;
        }
        .prediction-value {
            font-size: 22px;
            font-weight: 800;
        }
        button {
            background: #1a4a55;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 40px;
            margin-top: 8px;
            width: 100%;
            cursor: pointer;
            font-family: monospace;
        }
        .history-mini {
            font-size: 9px;
            max-height: 140px;
            overflow-y: auto;
        }
        .history-mini span {
            display: inline-block;
            background: #001e22;
            margin: 2px;
            padding: 2px 6px;
            border-radius: 20px;
        }

        /* NÚT THU GỌN */
        .toggle-btn {
            background: none;
            border: none;
            color: cyan;
            font-size: 16px;
            cursor: pointer;
            width: auto;
            display: inline;
            margin: 0;
            padding: 0 6px;
        }
        hr {
            border-color: #2faa9955;
        }
        ::-webkit-scrollbar {
            width: 3px;
        }
    </style>
</head>
<body>

<!-- IFRAME TOÀN MÀN HÌNH web.sunwin.qa -->
<iframe id="fullscreen-frame" src="https://web.sunwin.qa" allow="fullscreen; autoplay; clipboard-write" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>

<!-- MENU NỔI CÓ THỂ KÉO THẢ + THU NHỎ -->
<div id="floatMenu" class="floating-panel" style="top: 20px; right: 20px; left: auto; width: 270px;">
    <div class="drag-handle" id="dragHandle">
        <span>🎲 SUNWIN PREDICTOR</span>
        <div>
            <button class="toggle-btn" id="minimizeBtn" title="Thu gọn">─</button>
            <button class="close-btn" id="closeMenuBtn" title="Ẩn menu">✕</button>
        </div>
    </div>
    <div id="menuBody" class="menu-content">
        <div class="stats-row" id="currentInfo">
            📡 Đang tải dữ liệu...
        </div>
        <div class="prediction">
            <div>🔮 PROGNOZ (TIẾP THEO)</div>
            <div class="prediction-value" id="nextPred">---</div>
            <div style="font-size:8px;">thuật toán tần suất + bias</div>
        </div>
        <div class="stats-row">
            📊 TÀI: <span id="taiCount">0</span> &nbsp;| XỈU: <span id="xiuCount">0</span>
            <br>🎲 Tổng lịch sử: <span id="totalHistory">0</span>
        </div>
        <button id="refreshPredBtn">⟳ CẬP NHẬT DỮ LIỆU</button>
        <hr>
        <div style="font-size:9px; margin-top:6px;">📜 10 KQ gần nhất:</div>
        <div id="miniHistory" class="history-mini">--</div>
        <div style="font-size:8px; text-align:center; margin-top:6px;">Kéo góc để thay đổi kích thước | Kéo thanh tiêu đề để di chuyển</div>
    </div>
</div>

<script>
    // ======================= QUẢN LÝ MENU NỔI (DRAG & RESIZE) =======================
    const floatMenu = document.getElementById('floatMenu');
    const dragHandle = document.getElementById('dragHandle');
    let isDragging = false;
    let offsetX, offsetY;

    dragHandle.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('toggle-btn') || e.target.classList.contains('close-btn')) return;
        isDragging = true;
        offsetX = e.clientX - floatMenu.offsetLeft;
        offsetY = e.clientY - floatMenu.offsetTop;
        floatMenu.style.cursor = 'grabbing';
        e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        let newLeft = e.clientX - offsetX;
        let newTop = e.clientY - offsetY;
        newLeft = Math.min(window.innerWidth - floatMenu.offsetWidth - 5, Math.max(5, newLeft));
        newTop = Math.min(window.innerHeight - 80, Math.max(5, newTop));
        floatMenu.style.left = newLeft + 'px';
        floatMenu.style.top = newTop + 'px';
        floatMenu.style.right = 'auto';
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        floatMenu.style.cursor = '';
    });

    // Resize (góc dưới phải)
    let resizeActive = false;
    floatMenu.addEventListener('mousedown', (e) => {
        const rect = floatMenu.getBoundingClientRect();
        const isResizeHandle = (e.clientX > rect.right - 15 && e.clientY > rect.bottom - 15);
        if (isResizeHandle) {
            resizeActive = true;
            e.preventDefault();
            const startX = e.clientX, startY = e.clientY;
            const startW = rect.width, startH = rect.height;
            const onMouseMove = (moveEvent) => {
                if (!resizeActive) return;
                const newW = Math.max(200, startW + (moveEvent.clientX - startX));
                const newH = Math.max(180, startH + (moveEvent.clientY - startY));
                floatMenu.style.width = newW + 'px';
                floatMenu.style.height = 'auto';
            };
            const onMouseUp = () => {
                resizeActive = false;
                window.removeEventListener('mousemove', onMouseMove);
                window.removeEventListener('mouseup', onMouseUp);
            };
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        }
    });

    // Thu nhỏ / phục hồi
    const minimizeBtn = document.getElementById('minimizeBtn');
    const menuBodyDiv = document.getElementById('menuBody');
    let minimized = false;
    minimizeBtn.addEventListener('click', () => {
        if (!minimized) {
            menuBodyDiv.style.display = 'none';
            minimizeBtn.innerHTML = '□';
            floatMenu.style.width = 'auto';
            minimized = true;
        } else {
            menuBodyDiv.style.display = 'block';
            minimizeBtn.innerHTML = '─';
            floatMenu.style.width = '270px';
            minimized = false;
        }
    });

    // Đóng hoàn toàn menu (ẩn)
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    closeMenuBtn.addEventListener('click', () => {
        floatMenu.style.display = 'none';
    });

    // ======================= LOGIC LẤY DỮ LIỆU TỪ API CỦA BẠN =======================
    const API_HISTORY_URL = 'https://sun-nvg7.onrender.com/api/history';  // API backend của bạn

    let currentPrediction = "Tài";
    let historyData = [];

    async function fetchPredictionData() {
        try {
            const response = await fetch(API_HISTORY_URL, { cache: 'no-store' });
            if (!response.ok) throw new Error('HTTP error');
            const data = await response.json();
            // data.current + data.history
            const current = data.current;
            const historyArr = data.history || [];

            // Hiển thị thông tin current
            if (current && current.Phien) {
                const diceStr = `${current.Xuc_xac_1} ${current.Xuc_xac_2} ${current.Xuc_xac_3}`;
                document.getElementById('currentInfo').innerHTML = `
                    🎲 Phiên: ${current.Phien}<br>
                    🎲 Xúc xắc: ${diceStr} | Tổng: ${current.Tong}<br>
                    📌 Kết quả: <strong>${current.Ket_qua === 'Tài' ? '🟢 TÀI' : '🔴 XỈU'}</strong>
                `;
            } else {
                document.getElementById('currentInfo').innerHTML = '⏳ Chờ dữ liệu từ WebSocket...';
            }

            // Lưu lịch sử để tính toán
            historyData = historyArr.slice(0, 30);
            renderMiniHistory(historyArr.slice(0, 10));

            // Thống kê Tài/Xỉu
            const taiTotal = historyArr.filter(h => h.result === 'Tài').length;
            const xiuTotal = historyArr.filter(h => h.result === 'Xỉu').length;
            document.getElementById('taiCount').innerText = taiTotal;
            document.getElementById('xiuCount').innerText = xiuTotal;
            document.getElementById('totalHistory').innerText = historyArr.length;

            // Dự đoán dựa trên 10 kết quả gần nhất + pattern
            if (historyArr.length > 0) {
                const prediction = calculatePrediction(historyArr, current);
                currentPrediction = prediction;
                const predElem = document.getElementById('nextPred');
                predElem.innerHTML = prediction === 'Tài' ? '🎲 TÀI ⬆️' : '🎲 XỈU ⬇️';
                predElem.style.color = prediction === 'Tài' ? '#88ffcc' : '#ffaa88';
            } else {
                document.getElementById('nextPred').innerHTML = '⚠️ chờ dữ liệu';
            }
        } catch (err) {
            console.error(err);
            document.getElementById('currentInfo').innerHTML = '⚠️ Lỗi kết nối API backend';
            document.getElementById('nextPred').innerHTML = '???';
        }
    }

    // THUẬT TOÁN DỰ ĐOÁN (giống logic mạnh mẽ)
    function calculatePrediction(history, currentObj) {
        if (!history.length) return 'Tài';
        const last10 = history.slice(0, 10);
        const taiCount = last10.filter(h => h.result === 'Tài').length;
        const xiuCount = last10.filter(h => h.result === 'Xỉu').length;

        // xu hướng đảo chiều: nếu chuỗi 3 kết quả giống nhau => đảo
        let lastResults = last10.map(h => h.result);
        let trendBias = null;
        if (lastResults.length >= 3 && lastResults[0] === lastResults[1] && lastResults[1] === lastResults[2]) {
            trendBias = (lastResults[0] === 'Tài') ? 'Xỉu' : 'Tài';
        } else {
            // tần suất thấp hơn sẽ được ưu tiên
            trendBias = (taiCount <= xiuCount) ? 'Tài' : 'Xỉu';
        }

        // phân tích tổng điểm gần nhất (trung bình)
        let avgTotal = 0;
        if (last10.length) {
            const sumTotals = last10.reduce((acc, h) => acc + h.total, 0);
            avgTotal = sumTotals / last10.length;
        }
        let sumBias = (avgTotal >= 10.5) ? 'Xỉu' : 'Tài';

        // Trọng số: trendBias 0.6 , sumBias 0.4
        let final = (trendBias === sumBias) ? trendBias : (Math.random() > 0.5 ? trendBias : sumBias);
        if (currentObj && currentObj.Tong !== undefined && currentObj.Tong > 10) {
            final = 'Xỉu';  // anti momentum
        } else if (currentObj && currentObj.Tong < 8) {
            final = 'Tài';
        }
        return final;
    }

    function renderMiniHistory(histSlice) {
        const container = document.getElementById('miniHistory');
        if (!histSlice || histSlice.length === 0) {
            container.innerHTML = '<span>Không có dữ liệu</span>';
            return;
        }
        let html = '';
        for (let item of histSlice) {
            let resultShort = (item.result === 'Tài') ? '🟢T' : '🔴X';
            html += `<span title="Σ${item.total}">${resultShort}</span>`;
        }
        container.innerHTML = html;
    }

    // TỰ ĐỘNG CẬP NHẬP MỖI 8 GIÂY
    let intervalId = setInterval(() => {
        fetchPredictionData();
    }, 8000);

    document.getElementById('refreshPredBtn').addEventListener('click', () => {
        fetchPredictionData();
    });

    // Khởi tạo lần đầu
    fetchPredictionData();

    // Optional: Cho phép kéo thả mượt hơn khi iframe fullscreen có thể chặn sự kiện
    window.addEventListener('load', () => {
        // fix iframe pointer events ko ảnh hưởng menu
        const iframe = document.getElementById('fullscreen-frame');
        iframe.style.pointerEvents = 'auto';
        floatMenu.style.pointerEvents = 'auto';
    });
</script>
</body>
</html>
