<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SunWin AI - Tool thu nhỏ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
        }
        
        /* Iframe toàn màn hình */
        #sunwinFrame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        
        /* Tool thu nhỏ - có thể kéo thả */
        .floating-tool {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 280px;
            background: linear-gradient(135deg, rgba(26, 10, 5, 0.98), rgba(13, 5, 3, 0.98));
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 999999;
            transition: all 0.3s ease;
            cursor: move;
        }
        
        .floating-tool.minimized {
            width: auto;
            border-radius: 40px;
        }
        
        .floating-tool.minimized .tool-body {
            display: none;
        }
        
        /* Header tool */
        .tool-header {
            padding: 12px 15px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 140, 0, 0.05));
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .floating-tool.minimized .tool-header {
            border-radius: 40px;
            border-bottom: none;
        }
        
        .tool-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tool-title span:first-child {
            font-size: 18px;
        }
        
        .tool-title span:last-child {
            font-size: 13px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .tool-controls {
            display: flex;
            gap: 8px;
        }
        
        .tool-controls button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            width: 24px;
            height: 24px;
            font-size: 14px;
            cursor: pointer;
            color: #ffd700;
            transition: all 0.2s;
        }
        
        .tool-controls button:hover {
            background: rgba(255, 215, 0, 0.3);
        }
        
        /* Body tool */
        .tool-body {
            padding: 12px;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }
        
        .status-dot.connected {
            background: #44ff44;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-text {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .session-id {
            font-size: 12px;
            font-weight: bold;
            font-family: monospace;
            color: #ffd700;
        }
        
        /* Dice mini */
        .dice-mini {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .dice-mini-item {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #ffd700;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .total-mini {
            text-align: center;
            font-size: 11px;
            margin-bottom: 8px;
        }
        
        .total-mini-value {
            font-size: 18px;
            font-weight: bold;
            color: #ff8c00;
        }
        
        .result-mini {
            display: inline-block;
            width: 100%;
            text-align: center;
            padding: 5px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .result-tai {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        
        .result-xiu {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        
        /* Prediction mini */
        .prediction-mini {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 140, 0, 0.05));
            border-radius: 10px;
            padding: 8px;
            margin: 10px 0;
            text-align: center;
        }
        
        .prediction-value-mini {
            font-size: 24px;
            font-weight: bold;
        }
        
        .prediction-tai {
            color: #4caf50;
        }
        
        .prediction-xiu {
            color: #f44336;
        }
        
        .confidence-mini {
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        
        .confidence-fill-mini {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            transition: width 0.3s;
        }
        
        /* Stats mini */
        .stats-mini {
            display: flex;
            justify-content: space-around;
            gap: 6px;
            margin: 10px 0;
        }
        
        .stat-mini {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 6px;
            text-align: center;
        }
        
        .stat-label-mini {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .stat-value-mini {
            font-size: 14px;
            font-weight: bold;
            color: #ffd700;
        }
        
        /* History mini */
        .history-mini {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin: 10px 0;
        }
        
        .history-mini-item {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        .history-tai {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
        }
        
        .history-xiu {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
        }
        
        .refresh-btn {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            padding: 8px;
            border-radius: 25px;
            font-size: 11px;
            font-weight: bold;
            color: #1a0a05;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .refresh-btn:active {
            transform: scale(0.98);
        }
        
        @keyframes dicePop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .dice-mini-item {
            animation: dicePop 0.3s ease-out;
        }
        
        /* Nút inject */
        .inject-btn {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 9px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- Iframe SunWin toàn màn hình -->
    <iframe id="sunwinFrame" src="https://web.sunwin.qa" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    
    <!-- Tool thu nhỏ có thể kéo thả -->
    <div class="floating-tool" id="floatingTool">
        <div class="tool-header" id="toolHeader">
            <div class="tool-title">
                <span>🎲</span>
                <span>SUNWIN AI</span>
            </div>
            <div class="tool-controls">
                <button id="minimizeBtn" title="Thu gọn">−</button>
                <button id="closeBtn" title="Đóng">✕</button>
            </div>
        </div>
        
        <div class="tool-body">
            <div class="status-row">
                <div>
                    <span class="status-dot" id="statusDot"></span>
                    <span class="status-text" id="statusText">Đang kết nối...</span>
                </div>
                <div class="session-id" id="sessionId">#------</div>
            </div>
            
            <div class="dice-mini">
                <div class="dice-mini-item" id="dice1">?</div>
                <div class="dice-mini-item" id="dice2">?</div>
                <div class="dice-mini-item" id="dice3">?</div>
            </div>
            
            <div class="total-mini">
                Tổng: <span class="total-mini-value" id="totalValue">--</span>
            </div>
            
            <div>
                <span class="result-mini" id="resultBadge">---</span>
            </div>
            
            <div class="prediction-mini">
                <div style="font-size: 9px; color: rgba(255,255,255,0.5);">🤖 DỰ ĐOÁN</div>
                <div class="prediction-value-mini" id="predictionValue">---</div>
                <div class="confidence-mini">
                    <div class="confidence-fill-mini" id="confidenceFill" style="width: 0%"></div>
                </div>
                <div style="font-size: 8px;" id="confidenceText">Độ tin cậy: --%</div>
            </div>
            
            <div class="stats-mini">
                <div class="stat-mini">
                    <div class="stat-label-mini">🟢 Tài</div>
                    <div class="stat-value-mini" id="taiCount">0</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-label-mini">🔴 Xỉu</div>
                    <div class="stat-value-mini" id="xiuCount">0</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-label-mini">🔥 Chuỗi</div>
                    <div class="stat-value-mini" id="streakCount">0</div>
                </div>
            </div>
            
            <div class="history-mini" id="historyMini"></div>
            
            <button class="refresh-btn" onclick="refreshData()">⟳ LÀM MỚI</button>
            <button class="inject-btn" onclick="injectHook()">🔌 INJECT HOOK</button>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://sun-vzic.onrender.com';
        let autoRefresh = null;
        let hookInjected = false;
        
        // ============ KÉO THẢ TOOL ============
        const tool = document.getElementById('floatingTool');
        const header = document.getElementById('toolHeader');
        let isDragging = false;
        let dragOffsetX = 0, dragOffsetY = 0;
        
        header.addEventListener('mousedown', (e) => {
            if (e.target.closest('.tool-controls')) return;
            isDragging = true;
            const rect = tool.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
            tool.style.cursor = 'grabbing';
            e.preventDefault();
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let x = e.clientX - dragOffsetX;
            let y = e.clientY - dragOffsetY;
            x = Math.max(0, Math.min(window.innerWidth - tool.offsetWidth, x));
            y = Math.max(0, Math.min(window.innerHeight - tool.offsetHeight, y));
            tool.style.left = x + 'px';
            tool.style.top = y + 'px';
            tool.style.right = 'auto';
            tool.style.bottom = 'auto';
        });
        
        document.addEventListener('mouseup', () => {
            isDragging = false;
            tool.style.cursor = '';
        });
        
        // Touch cho mobile
        header.addEventListener('touchstart', (e) => {
            if (e.target.closest('.tool-controls')) return;
            isDragging = true;
            const rect = tool.getBoundingClientRect();
            const touch = e.touches[0];
            dragOffsetX = touch.clientX - rect.left;
            dragOffsetY = touch.clientY - rect.top;
            e.preventDefault();
        });
        
        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            let x = touch.clientX - dragOffsetX;
            let y = touch.clientY - dragOffsetY;
            x = Math.max(0, Math.min(window.innerWidth - tool.offsetWidth, x));
            y = Math.max(0, Math.min(window.innerHeight - tool.offsetHeight, y));
            tool.style.left = x + 'px';
            tool.style.top = y + 'px';
            tool.style.right = 'auto';
            tool.style.bottom = 'auto';
        });
        
        document.addEventListener('touchend', () => {
            isDragging = false;
        });
        
        // ============ THU GỌN / ĐÓNG ==========
        const minimizeBtn = document.getElementById('minimizeBtn');
        const closeBtn = document.getElementById('closeBtn');
        
        minimizeBtn.addEventListener('click', () => {
            tool.classList.toggle('minimized');
            minimizeBtn.textContent = tool.classList.contains('minimized') ? '+' : '−';
        });
        
        closeBtn.addEventListener('click', () => {
            tool.style.display = 'none';
        });
        
        // Double click để thu gọn
        header.addEventListener('dblclick', () => {
            tool.classList.toggle('minimized');
            minimizeBtn.textContent = tool.classList.contains('minimized') ? '+' : '−';
        });
        
        // ============ INJECT HOOK VÀO IFRAME ============
        function injectHook() {
            const iframe = document.getElementById('sunwinFrame');
            if (!iframe || !iframe.contentWindow) {
                addLog('⏳ Chưa thể inject, đợi iframe tải...', true);
                return;
            }
            
            const hookCode = `
                (function() {
                    const API = '${API_URL}/api/result';
                    let last = localStorage.getItem('sw_last') || '';
                    const origWS = window.WebSocket;
                    window.WebSocket = function(...a){
                        const ws = new origWS(...a);
                        ws.addEventListener('message', e=>{
                            try{
                                const d = JSON.parse(e.data);
                                let s = d.session || d.roundId;
                                let di = d.dice || d.result?.dice;
                                let t = d.total;
                                let r = d.result || d.winner;
                                if(s && di?.length===3 && s!=last){
                                    if(!t) t = di[0]+di[1]+di[2];
                                    if(!r) r = t>=11 ? 'Tài' : 'Xỉu';
                                    fetch(API, {
                                        method: 'POST',
                                        headers: {'Content-Type':'application/json'},
                                        body: JSON.stringify({session:parseInt(s), dice:di, total:t, result:r})
                                    }).then(()=>{
                                        last=s;
                                        localStorage.setItem('sw_last',s);
                                        console.log('✅ Gửi phiên',s);
                                    });
                                }
                            } catch(e) {}
                        });
                        return ws;
                    };
                    window.WebSocket.prototype = origWS.prototype;
                    console.log('✅ SunWin Hook đã chạy trong iframe!');
                })();
            `;
            
            try {
                iframe.contentWindow.eval(hookCode);
                hookInjected = true;
                addLog('✅ Đã inject hook vào iframe!');
                addLog('🎲 Vào bàn Tài Xỉu để bắt đầu');
            } catch (e) {
                addLog('❌ Lỗi inject: ' + e.message, true);
                addLog('💡 Thử bấm nút INJECT HOOK sau khi đăng nhập', true);
            }
        }
        
        // Tự động inject khi iframe load
        document.getElementById('sunwinFrame').addEventListener('load', function() {
            addLog('📄 Trang SunWin đã tải');
            setTimeout(() => injectHook(), 3000);
        });
        
        // ============ LẤY DỮ LIỆU TỪ API ============
        function addLog(msg, isError = false) {
            const logEl = document.getElementById('logArea');
            if (!logEl) return;
            const time = new Date().toLocaleTimeString('vi-VN');
            const color = isError ? '#ff6666' : '#ffd700';
            logEl.innerHTML = `<div style="color: ${color};">[${time}] ${msg}</div>` + logEl.innerHTML;
            if (logEl.children.length > 15) logEl.removeChild(logEl.lastChild);
            console.log(msg);
        }
        
        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}/api/history?_=${Date.now()}`);
                const data = await res.json();
                
                if (data.success && data.current) {
                    const c = data.current;
                    document.getElementById('statusDot').classList.add('connected');
                    document.getElementById('statusText').textContent = 'Đã kết nối';
                    document.getElementById('sessionId').textContent = `#${c.session}`;
                    
                    const diceEls = ['dice1', 'dice2', 'dice3'];
                    diceEls.forEach((id, i) => {
                        const el = document.getElementById(id);
                        if (c.dice && c.dice[i]) {
                            el.style.animation = 'none';
                            el.offsetHeight;
                            el.style.animation = 'dicePop 0.3s ease-out';
                            el.textContent = c.dice[i];
                        }
                    });
                    
                    document.getElementById('totalValue').textContent = c.total || '--';
                    
                    const badge = document.getElementById('resultBadge');
                    if (c.result === 'Tài') {
                        badge.textContent = 'TÀI';
                        badge.className = 'result-mini result-tai';
                    } else if (c.result === 'Xỉu') {
                        badge.textContent = 'XỈU';
                        badge.className = 'result-mini result-xiu';
                    }
                    
                    await renderHistory(data.history);
                } else {
                    document.getElementById('statusDot').classList.remove('connected');
                    document.getElementById('statusText').textContent = 'Chờ dữ liệu...';
                }
                
                await fetchPrediction();
                
            } catch (e) {
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = 'Mất kết nối';
            }
        }
        
        async function fetchPrediction() {
            try {
                const res = await fetch(`${API_URL}/api/predict`);
                const pred = await res.json();
                const predEl = document.getElementById('predictionValue');
                predEl.textContent = pred.prediction || '---';
                predEl.className = `prediction-value-mini prediction-${pred.prediction === 'Tài' ? 'tai' : 'xiu'}`;
                document.getElementById('confidenceFill').style.width = `${pred.confidence || 0}%`;
                document.getElementById('confidenceText').textContent = `Độ tin cậy: ${pred.confidence || 0}%`;
                
                if (pred.stats) {
                    document.getElementById('taiCount').textContent = pred.stats.tai || 0;
                    document.getElementById('xiuCount').textContent = pred.stats.xiu || 0;
                    document.getElementById('streakCount').textContent = pred.stats.streak || 0;
                }
            } catch (e) {}
        }
        
        async function renderHistory(history) {
            const container = document.getElementById('historyMini');
            container.innerHTML = '';
            const hist = history || [];
            for (let i = 0; i < Math.min(5, hist.length); i++) {
                const item = hist[i];
                const div = document.createElement('div');
                div.className = `history-mini-item history-${item.result === 'Tài' ? 'tai' : 'xiu'}`;
                div.textContent = item.result === 'Tài' ? 'T' : 'X';
                container.appendChild(div);
            }
            while (container.children.length < 5) {
                const empty = document.createElement('div');
                empty.className = 'history-mini-item history-tai';
                empty.style.opacity = '0.3';
                empty.textContent = '?';
                container.appendChild(empty);
            }
        }
        
        function refreshData() {
            fetchData();
            if (!hookInjected) {
                injectHook();
            }
        }
        
        // Khởi tạo
        function init() {
            fetchData();
            autoRefresh = setInterval(() => fetchData(), 5000);
        }
        
        init();
    </script>
</body>
</html>
