<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SunWin AI - Tool nhỏ gọn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Tool container - có thể kéo thả */
        .sunwin-tool {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 280px;
            background: linear-gradient(135deg, rgba(26, 10, 5, 0.98), rgba(13, 5, 3, 0.98));
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 999999;
            transition: all 0.3s ease;
            cursor: move;
        }
        
        .sunwin-tool.minimized {
            width: auto;
            border-radius: 40px;
        }
        
        .sunwin-tool.minimized .tool-body {
            display: none;
        }
        
        /* Header */
        .tool-header {
            padding: 12px 15px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 140, 0, 0.05));
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .tool-header.minimized {
            border-radius: 40px;
            border-bottom: none;
        }
        
        .tool-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tool-title span:first-child {
            font-size: 18px;
        }
        
        .tool-title span:last-child {
            font-size: 13px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .tool-controls {
            display: flex;
            gap: 8px;
        }
        
        .tool-controls button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            width: 24px;
            height: 24px;
            font-size: 14px;
            cursor: pointer;
            color: #ffd700;
            transition: all 0.2s;
        }
        
        .tool-controls button:hover {
            background: rgba(255, 215, 0, 0.3);
        }
        
        /* Body */
        .tool-body {
            padding: 12px;
        }
        
        /* Trạng thái */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }
        
        .status-dot.connected {
            background: #44ff44;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-text {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .session-id {
            font-size: 12px;
            font-weight: bold;
            font-family: monospace;
            color: #ffd700;
        }
        
        /* Kết quả */
        .result-row {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
        }
        
        .dice-mini {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .dice-mini-item {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #ffd700;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .total-mini {
            text-align: center;
            font-size: 11px;
            margin-bottom: 6px;
        }
        
        .total-mini-value {
            font-size: 18px;
            font-weight: bold;
            color: #ff8c00;
        }
        
        .result-badge-mini {
            display: inline-block;
            width: 100%;
            text-align: center;
            padding: 4px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .result-tai {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        
        .result-xiu {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        
        /* Dự đoán mini */
        .prediction-mini {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 140, 0, 0.05));
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .prediction-label-mini {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .prediction-value-mini {
            font-size: 22px;
            font-weight: bold;
        }
        
        .prediction-tai {
            color: #4caf50;
        }
        
        .prediction-xiu {
            color: #f44336;
        }
        
        .confidence-mini {
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        
        .confidence-fill-mini {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            transition: width 0.3s;
        }
        
        /* Thống kê mini */
        .stats-mini {
            display: flex;
            justify-content: space-around;
            gap: 6px;
            margin-bottom: 10px;
        }
        
        .stat-mini {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 6px;
            text-align: center;
        }
        
        .stat-label-mini {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .stat-value-mini {
            font-size: 14px;
            font-weight: bold;
            color: #ffd700;
        }
        
        /* Lịch sử mini */
        .history-mini {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        .history-mini-item {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        .history-tai {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
        }
        
        .history-xiu {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
        }
        
        /* Nút refresh */
        .refresh-btn {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            padding: 8px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: bold;
            color: #1a0a05;
            cursor: pointer;
            margin-top: 5px;
        }
        
        .refresh-btn:active {
            transform: scale(0.98);
        }
        
        /* Animation dice */
        @keyframes dicePop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .dice-mini-item {
            animation: dicePop 0.3s ease-out;
        }
    </style>
</head>
<body>
    <!-- Tool nhỏ gọn -->
    <div class="sunwin-tool" id="sunwinTool">
        <div class="tool-header" id="toolHeader">
            <div class="tool-title">
                <span>🎲</span>
                <span>SUNWIN AI</span>
            </div>
            <div class="tool-controls">
                <button id="minimizeBtn" title="Thu gọn">−</button>
                <button id="closeBtn" title="Đóng">✕</button>
            </div>
        </div>
        
        <div class="tool-body">
            <!-- Trạng thái -->
            <div class="status-row">
                <div>
                    <span class="status-dot" id="statusDot"></span>
                    <span class="status-text" id="statusText">Đang kết nối...</span>
                </div>
                <div class="session-id" id="sessionId">#------</div>
            </div>
            
            <!-- Kết quả -->
            <div class="result-row">
                <div class="dice-mini">
                    <div class="dice-mini-item" id="dice1">?</div>
                    <div class="dice-mini-item" id="dice2">?</div>
                    <div class="dice-mini-item" id="dice3">?</div>
                </div>
                <div class="total-mini">
                    Tổng: <span class="total-mini-value" id="totalValue">--</span>
                </div>
                <div>
                    <span class="result-badge-mini" id="resultBadge">---</span>
                </div>
            </div>
            
            <!-- Dự đoán -->
            <div class="prediction-mini">
                <div class="prediction-label-mini">🤖 DỰ ĐOÁN TIẾP THEO</div>
                <div class="prediction-value-mini" id="predictionValue">---</div>
                <div class="confidence-mini">
                    <div class="confidence-fill-mini" id="confidenceFill" style="width: 0%"></div>
                </div>
                <div style="font-size: 9px; margin-top: 4px;" id="confidenceText">Độ tin cậy: --%</div>
            </div>
            
            <!-- Thống kê nhanh -->
            <div class="stats-mini">
                <div class="stat-mini">
                    <div class="stat-label-mini">🟢 Tài</div>
                    <div class="stat-value-mini" id="taiCount">0</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-label-mini">🔴 Xỉu</div>
                    <div class="stat-value-mini" id="xiuCount">0</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-label-mini">🔥 Chuỗi</div>
                    <div class="stat-value-mini" id="streakCount">0</div>
                </div>
            </div>
            
            <!-- Lịch sử 5 phiên gần nhất -->
            <div class="history-mini" id="historyMini"></div>
            
            <!-- Nút làm mới -->
            <button class="refresh-btn" onclick="refreshData()">⟳ LÀM MỚI</button>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://sun-vzic.onrender.com';
        let autoRefresh = null;
        
        // ============ KÉO THẢ TOOL ============
        const tool = document.getElementById('sunwinTool');
        const header = document.getElementById('toolHeader');
        let isDragging = false;
        let dragOffsetX = 0, dragOffsetY = 0;
        
        header.addEventListener('mousedown', (e) => {
            if (e.target.closest('.tool-controls')) return;
            isDragging = true;
            const rect = tool.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
            tool.style.cursor = 'grabbing';
            e.preventDefault();
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let x = e.clientX - dragOffsetX;
            let y = e.clientY - dragOffsetY;
            x = Math.max(0, Math.min(window.innerWidth - tool.offsetWidth, x));
            y = Math.max(0, Math.min(window.innerHeight - tool.offsetHeight, y));
            tool.style.left = x + 'px';
            tool.style.top = y + 'px';
            tool.style.right = 'auto';
            tool.style.bottom = 'auto';
        });
        
        document.addEventListener('mouseup', () => {
            isDragging = false;
            tool.style.cursor = '';
        });
        
        // Touch cho mobile
        header.addEventListener('touchstart', (e) => {
            if (e.target.closest('.tool-controls')) return;
            isDragging = true;
            const rect = tool.getBoundingClientRect();
            const touch = e.touches[0];
            dragOffsetX = touch.clientX - rect.left;
            dragOffsetY = touch.clientY - rect.top;
            e.preventDefault();
        });
        
        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            let x = touch.clientX - dragOffsetX;
            let y = touch.clientY - dragOffsetY;
            x = Math.max(0, Math.min(window.innerWidth - tool.offsetWidth, x));
            y = Math.max(0, Math.min(window.innerHeight - tool.offsetHeight, y));
            tool.style.left = x + 'px';
            tool.style.top = y + 'px';
            tool.style.right = 'auto';
            tool.style.bottom = 'auto';
        });
        
        document.addEventListener('touchend', () => {
            isDragging = false;
        });
        
        // ============ THU GỌN / ĐÓNG ============
        const minimizeBtn = document.getElementById('minimizeBtn');
        const closeBtn = document.getElementById('closeBtn');
        const toolHeader = document.querySelector('.tool-header');
        
        minimizeBtn.addEventListener('click', () => {
            tool.classList.toggle('minimized');
            toolHeader.classList.toggle('minimized');
            minimizeBtn.textContent = tool.classList.contains('minimized') ? '+' : '−';
        });
        
        closeBtn.addEventListener('click', () => {
            tool.style.display = 'none';
        });
        
        // Double click để thu gọn
        toolHeader.addEventListener('dblclick', () => {
            tool.classList.toggle('minimized');
            toolHeader.classList.toggle('minimized');
            minimizeBtn.textContent = tool.classList.contains('minimized') ? '+' : '−';
        });
        
        // ============ CHỨC NĂNG CHÍNH ============
        function addLog(msg) {
            console.log(`[${new Date().toLocaleTimeString()}] ${msg}`);
        }
        
        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}/api/history?_=${Date.now()}`);
                const data = await res.json();
                
                if (data.success && data.current) {
                    const c = data.current;
                    document.getElementById('statusDot').classList.add('connected');
                    document.getElementById('statusText').textContent = 'Đã kết nối';
                    document.getElementById('sessionId').textContent = `#${c.session}`;
                    
                    // Xúc xắc với animation
                    const diceEls = [document.getElementById('dice1'), document.getElementById('dice2'), document.getElementById('dice3')];
                    diceEls.forEach((el, i) => {
                        if (c.dice && c.dice[i]) {
                            el.style.animation = 'none';
                            el.offsetHeight;
                            el.style.animation = 'dicePop 0.3s ease-out';
                            el.textContent = c.dice[i];
                        }
                    });
                    
                    document.getElementById('totalValue').textContent = c.total || '--';
                    
                    const badge = document.getElementById('resultBadge');
                    if (c.result === 'Tài') {
                        badge.textContent = 'TÀI';
                        badge.className = 'result-badge-mini result-tai';
                    } else if (c.result === 'Xỉu') {
                        badge.textContent = 'XỈU';
                        badge.className = 'result-badge-mini result-xiu';
                    }
                } else {
                    document.getElementById('statusDot').classList.remove('connected');
                    document.getElementById('statusText').textContent = 'Chờ dữ liệu...';
                }
                
                await fetchPrediction();
                await renderHistory();
                
            } catch (e) {
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = 'Mất kết nối';
                addLog('Lỗi: ' + e.message);
            }
        }
        
        async function fetchPrediction() {
            try {
                const res = await fetch(`${API_URL}/api/predict`);
                const pred = await res.json();
                const predEl = document.getElementById('predictionValue');
                predEl.textContent = pred.prediction || '---';
                predEl.className = `prediction-value-mini prediction-${pred.prediction === 'Tài' ? 'tai' : 'xiu'}`;
                document.getElementById('confidenceFill').style.width = `${pred.confidence || 0}%`;
                document.getElementById('confidenceText').textContent = `Độ tin cậy: ${pred.confidence || 0}%`;
                
                if (pred.stats) {
                    document.getElementById('taiCount').textContent = pred.stats.tai || 0;
                    document.getElementById('xiuCount').textContent = pred.stats.xiu || 0;
                    document.getElementById('streakCount').textContent = pred.stats.streak || 0;
                }
            } catch (e) {}
        }
        
        async function renderHistory() {
            try {
                const res = await fetch(`${API_URL}/api/history`);
                const data = await res.json();
                const container = document.getElementById('historyMini');
                container.innerHTML = '';
                
                const history = data.history || [];
                for (let i = 0; i < Math.min(5, history.length); i++) {
                    const item = history[i];
                    const div = document.createElement('div');
                    div.className = `history-mini-item history-${item.result === 'Tài' ? 'tai' : 'xiu'}`;
                    div.textContent = item.result === 'Tài' ? 'T' : 'X';
                    container.appendChild(div);
                }
                
                while (container.children.length < 5) {
                    const empty = document.createElement('div');
                    empty.className = 'history-mini-item history-tai';
                    empty.style.opacity = '0.3';
                    empty.textContent = '?';
                    container.appendChild(empty);
                }
            } catch (e) {}
        }
        
        function refreshData() {
            fetchData();
        }
        
        // Khởi tạo
        function init() {
            addLog('🚀 SunWin Tool khởi động');
            fetchData();
            renderHistory();
            autoRefresh = setInterval(() => {
                fetchData();
            }, 5000);
        }
        
        init();
    </script>
</body>
</html>
