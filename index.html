<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunWin AI - Tự động quét dữ liệu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f23 100%);
            font-family: 'Segoe UI', 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 200, 255, 0.3);
        }
        
        .header h1 {
            font-size: 28px;
            color: #00c8ff;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.5);
        }
        
        .header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-top: 5px;
        }
        
        /* Status Bar */
        .status-bar {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 1.5s ease-in-out infinite;
            display: inline-block;
            margin-right: 8px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 5px #00ff88; }
            50% { opacity: 0.3; box-shadow: none; }
        }
        
        .status-text {
            color: #00ff88;
            font-size: 12px;
            font-weight: 600;
        }
        
        .session-id {
            font-family: monospace;
            color: #ffaa00;
            font-size: 18px;
            font-weight: bold;
        }
        
        /* Card kết quả */
        .result-card {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .dice-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .dice {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 200, 255, 0.5);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.3);
        }
        
        .total-area {
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .total-value {
            font-size: 36px;
            font-weight: bold;
            color: #ffaa00;
        }
        
        .result-badge {
            display: inline-block;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .result-tai {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
        }
        
        .result-xiu {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }
        
        /* Dự đoán */
        .prediction-card {
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.1), rgba(0, 100, 255, 0.05));
            border: 1px solid rgba(0, 200, 255, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .prediction-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .prediction-value {
            font-size: 52px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .confidence-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #00c8ff);
            transition: width 0.5s ease;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00c8ff;
            margin-top: 5px;
        }
        
        /* Lịch sử */
        .history-strip {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .history-item {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
        }
        
        .history-tai {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }
        
        .history-xiu {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }
        
        .history-empty {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
        }
        
        button {
            background: rgba(0, 200, 255, 0.2);
            border: 1px solid #00c8ff;
            color: #00c8ff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin-top: 10px;
        }
        
        button:hover {
            background: rgba(0, 200, 255, 0.4);
        }
        
        .footer {
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 20px;
        }
        
        .log {
            font-size: 10px;
            color: rgba(255, 255, 0, 0.5);
            margin-top: 10px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎲 SUNWIN AI</h1>
            <p>Tự động quét dữ liệu • Dự đoán thông minh</p>
        </div>

        <div class="status-bar">
            <div>
                <span class="live-dot"></span>
                <span class="status-text" id="statusText">Đang kết nối...</span>
            </div>
            <div class="session-id" id="sessionId">#------</div>
        </div>

        <div class="result-card">
            <div class="dice-container" id="diceContainer">
                <div class="dice">-</div>
                <div class="dice">-</div>
                <div class="dice">-</div>
            </div>
            <div class="total-area">
                Tổng điểm: <span class="total-value" id="totalValue">--</span>
            </div>
            <div>
                <span class="result-badge" id="resultBadge">---</span>
            </div>
        </div>

        <div class="prediction-card">
            <div class="prediction-label">🤖 DỰ ĐOÁN PHIÊN TIẾP THEO</div>
            <div class="prediction-value" id="predictionValue" style="color: #2ecc71;">---</div>
            <div class="confidence-bar">
                <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
            </div>
            <div id="confidenceText">Độ tin cậy: --%</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">🟢 TÀI (10P)</div>
                <div class="stat-value" id="taiCount">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🔴 XỈU (10P)</div>
                <div class="stat-value" id="xiuCount">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🔥 CHUỖI</div>
                <div class="stat-value" id="streakCount">--</div>
            </div>
        </div>

        <div class="history-strip" id="historyStrip"></div>

        <button onclick="refreshData()">🔄 Làm mới dữ liệu</button>

        <div class="log" id="logArea">[✓] Đã khởi tạo. Đang kết nối API...</div>

        <div class="footer">
            <span id="timeUpdate">--:--:--</span> | Dữ liệu từ SunWin | v3.0
        </div>
    </div>

    <script>
        // Cấu hình API
        const API_BASE = 'https://sunwin-tool.onrender.com';
        let autoRefresh = null;
        
        function addLog(msg) {
            const logEl = document.getElementById('logArea');
            const time = new Date().toLocaleTimeString('vi-VN');
            logEl.innerHTML = `[${time}] ${msg}<br>${logEl.innerHTML}`.slice(0, 500);
            console.log(`[${time}] ${msg}`);
        }
        
        function updateStatus(msg, isError = false) {
            const statusEl = document.getElementById('statusText');
            statusEl.textContent = msg;
            statusEl.style.color = isError ? '#e74c3c' : '#00ff88';
        }
        
        async function fetchData() {
            try {
                updateStatus('Đang tải...');
                const response = await fetch(`${API_BASE}/api/history?_=${Date.now()}`);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                addLog('✅ Đã nhận dữ liệu từ API');
                updateStatus('Đã kết nối ✓');
                
                if (data && data.current) {
                    renderData(data);
                } else {
                    addLog('⚠️ Chưa có dữ liệu từ API, hiển thị dữ liệu mẫu');
                    renderMockData();
                }
                
                await fetchPrediction();
                
            } catch (error) {
                addLog(`❌ Lỗi: ${error.message}`);
                updateStatus('Lỗi kết nối', true);
                renderMockData();
                renderMockPrediction();
            }
        }
        
        async function fetchPrediction() {
            try {
                const response = await fetch(`${API_BASE}/api/predict`);
                const pred = await response.json();
                renderPrediction(pred);
            } catch (error) {
                addLog(`⚠️ Lỗi dự đoán: ${error.message}`);
                renderMockPrediction();
            }
        }
        
        function renderData(data) {
            const current = data.current;
            const session = current.Phien || current.session || 0;
            const result = current.Ket_qua || current.result;
            const dice = [
                current.Xuc_xac_1 || current.dice?.[0] || 0,
                current.Xuc_xac_2 || current.dice?.[1] || 0,
                current.Xuc_xac_3 || current.dice?.[2] || 0
            ];
            const total = current.Tong || current.total || (dice[0] + dice[1] + dice[2]);
            
            // Cập nhật giao diện
            document.getElementById('sessionId').textContent = `#${session}`;
            document.getElementById('totalValue').textContent = total;
            
            const diceEls = document.querySelectorAll('.dice');
            dice.forEach((val, idx) => {
                if (diceEls[idx]) diceEls[idx].textContent = val || '-';
            });
            
            const badge = document.getElementById('resultBadge');
            if (result === 'Tài') {
                badge.textContent = 'TÀI';
                badge.className = 'result-badge result-tai';
            } else if (result === 'Xỉu') {
                badge.textContent = 'XỈU';
                badge.className = 'result-badge result-xiu';
            } else {
                badge.textContent = '???';
            }
            
            // Lịch sử
            if (data.history && data.history.length > 0) {
                renderHistory(data.history);
            }
        }
        
        function renderHistory(history) {
            const container = document.getElementById('historyStrip');
            container.innerHTML = '';
            
            const last10 = history.slice(0, 10);
            
            for (let i = 0; i < last10.length; i++) {
                const item = last10[i];
                const div = document.createElement('div');
                div.className = 'history-item';
                
                if (item.Ket_qua === 'Tài') {
                    div.classList.add('history-tai');
                    div.textContent = 'T';
                } else if (item.Ket_qua === 'Xỉu') {
                    div.classList.add('history-xiu');
                    div.textContent = 'X';
                } else {
                    div.classList.add('history-empty');
                    div.textContent = '·';
                }
                container.appendChild(div);
            }
            
            while (container.children.length < 10) {
                const empty = document.createElement('div');
                empty.className = 'history-item history-empty';
                empty.textContent = '·';
                container.appendChild(empty);
            }
        }
        
        function renderPrediction(pred) {
            const predEl = document.getElementById('predictionValue');
            predEl.textContent = pred.prediction || '---';
            predEl.style.color = pred.prediction === 'Tài' ? '#2ecc71' : '#e74c3c';
            
            document.getElementById('confidenceFill').style.width = `${pred.confidence || 0}%`;
            document.getElementById('confidenceText').textContent = `Độ tin cậy: ${pred.confidence || 0}%`;
            
            if (pred.stats) {
                document.getElementById('taiCount').textContent = pred.stats.tai || 0;
                document.getElementById('xiuCount').textContent = pred.stats.xiu || 0;
                document.getElementById('streakCount').textContent = pred.stats.streak || 0;
            }
        }
        
        function renderMockData() {
            document.getElementById('sessionId').textContent = '#525502';
            document.getElementById('totalValue').textContent = '14';
            const diceEls = document.querySelectorAll('.dice');
            [5, 4, 5].forEach((val, idx) => {
                if (diceEls[idx]) diceEls[idx].textContent = val;
            });
            const badge = document.getElementById('resultBadge');
            badge.textContent = 'TÀI';
            badge.className = 'result-badge result-tai';
        }
        
        function renderMockPrediction() {
            document.getElementById('predictionValue').textContent = 'TÀI';
            document.getElementById('predictionValue').style.color = '#2ecc71';
            document.getElementById('confidenceFill').style.width = '65%';
            document.getElementById('confidenceText').textContent = 'Độ tin cậy: 65%';
            document.getElementById('taiCount').textContent = '6';
            document.getElementById('xiuCount').textContent = '4';
            document.getElementById('streakCount').textContent = '2';
        }
        
        function refreshData() {
            addLog('🔄 Người dùng yêu cầu làm mới');
            fetchData();
        }
        
        function updateTime() {
            document.getElementById('timeUpdate').textContent = new Date().toLocaleTimeString('vi-VN');
        }
        
        function init() {
            addLog('🚀 SunWin AI khởi động');
            updateTime();
            fetchData();
            
            // Tự động refresh mỗi 5 giây
            if (autoRefresh) clearInterval(autoRefresh);
            autoRefresh = setInterval(() => {
                fetchData();
                updateTime();
            }, 5000);
        }
        
        init();
    </script>
</body>
</html>
