<!DOCTYPE html>
<html lang="vi">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
   <title>SunWin AI · Tài Xỉu Collector</title>
   <style>
       @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
       * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
       body { background:#080612; font-family:'Rajdhani',sans-serif; width:100vw; height:100vh; overflow:hidden; }

       #sunwin-frame { position:fixed; inset:0; width:100%; height:100%; border:none; z-index:1; }

       .status-bar {
           position:fixed; top:14px; left:50%; transform:translateX(-50%);
           background:rgba(0,0,0,0.85); border:1px solid rgba(0,200,255,0.4);
           padding:6px 18px; border-radius:40px; font-size:11px; color:#00ffaa;
           z-index:999998; display:flex; align-items:center; gap:9px;
           backdrop-filter:blur(16px); font-weight:700; letter-spacing:0.8px;
           white-space:nowrap; box-shadow:0 0 12px rgba(0,255,170,0.2);
       }
       .live-dot {
           width:8px; height:8px; border-radius:50%; background:#00ff88;
           animation:pulse-dot 1.4s ease-in-out infinite;
       }
       @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

       #sw-panel {
           position:fixed; bottom:24px; right:16px; width:290px;
           background:rgba(8,6,20,0.96); border:1px solid rgba(0,200,255,0.45);
           border-radius:20px;
           box-shadow:0 0 30px rgba(0,200,255,0.15),0 20px 35px rgba(0,0,0,0.8);
           z-index:999999; backdrop-filter:blur(28px);
           transition:opacity 0.25s ease, transform 0.2s ease;
       }
       #sw-panel.hidden { opacity:0; pointer-events:none; transform:translateY(12px); }
       #sw-panel.mini .sw-body { display:none; }
       #sw-panel.mini { width:auto; border-radius:40px; }

       #sw-toggle {
           position:fixed; bottom:24px; right:16px;
           width:52px; height:52px; border-radius:50%;
           background:linear-gradient(145deg,#00c8ff,#0033aa);
           border:none; color:#fff; font-size:26px; cursor:pointer;
           z-index:999998; display:none; align-items:center; justify-content:center;
           box-shadow:0 0 18px rgba(0,200,255,0.6);
       }
       #sw-toggle.show { display:flex; }
       #sw-toggle:active { transform:scale(0.93); }

       .sw-header {
           padding:12px 14px;
           background:rgba(0,200,255,0.07);
           border-bottom:1px solid rgba(0,200,255,0.18);
           border-radius:20px 20px 0 0;
           display:flex; justify-content:space-between; align-items:center;
           cursor:grab;
       }
       .sw-brand { font-family:'Orbitron',monospace; font-size:12px; font-weight:900; letter-spacing:2px; color:#0cf; }
       .sw-brand span { color:#bbb; }
       .sw-controls { display:flex; gap:8px; }
       .sw-ctrl {
           width:24px; height:24px; border-radius:30px; border:none;
           background:rgba(255,255,255,0.08); color:#ccc; font-size:14px;
           cursor:pointer; display:flex; align-items:center; justify-content:center;
       }
       .sw-ctrl:hover { background:#00c8ff40; }

       .sw-body { padding:14px; }

       .session-row {
           background:rgba(0,0,0,0.4); padding:8px 12px; border-radius:12px;
           margin-bottom:12px; display:flex; justify-content:space-between;
       }
       .session-label { font-size:9px; color:#aaa; text-transform:uppercase; }
       .session-num { font-family:'Orbitron'; font-size:14px; color:#0cf; font-weight:700; }

       .last-result {
           background:rgba(20,20,35,0.7); border:1px solid rgba(0,255,200,0.2);
           border-radius:14px; padding:10px 12px; margin-bottom:12px;
           display:flex; align-items:center; justify-content:space-between;
           flex-wrap:wrap; gap:5px;
       }
       .last-result-label { font-size:8px; color:#9aa; }
       .last-dice { display:flex; gap:5px; }
       .dice-val {
           width:30px; height:30px; background:#0a0a14; border:1px solid #0cf55a;
           border-radius:8px; display:flex; align-items:center; justify-content:center;
           font-size:14px; font-weight:800; color:#fff;
       }
       .last-total { font-family:'Orbitron'; font-size:18px; font-weight:800; color:#fff; }
       .last-tag { font-size:11px; font-weight:800; padding:4px 12px; border-radius:40px; }
       .tag-tai { background:#2ecc7122; color:#2ecc71; border:1px solid #2ecc71; }
       .tag-xiu { background:#e74c3c22; color:#e74c3c; border:1px solid #e74c3c; }

       .log-box {
           background:#00000080; border-left:3px solid #f0c420; border-radius:8px;
           padding:8px 10px; margin-bottom:12px; font-size:9px;
           color:#ffdd88; font-family: monospace; max-height:45px; overflow-y:auto;
       }

       .pred-box {
           background:linear-gradient(135deg, #0a0a1a, #01000c);
           border:1px solid rgba(0,200,255,0.5); border-radius:18px;
           padding:14px 8px; text-align:center; margin-bottom:14px;
           position:relative;
       }
       .pred-label { font-size:9px; color:#0cf9; letter-spacing:2px; margin-bottom:6px; }
       .pred-value { font-family:'Orbitron'; font-size:34px; font-weight:900; letter-spacing:3px; }
       .pred-tai { color:#2ecc71; text-shadow:0 0 12px #2ecc71; }
       .pred-xiu { color:#e74c3c; text-shadow:0 0 12px #e74c3c; }
       .pred-waiting { color:#aaa; font-size:26px; }

       .conf-section { margin-top:8px; }
       .conf-row { display:flex; justify-content:space-between; margin-bottom:6px; }
       .conf-label { font-size:9px; color:#ccc8; }
       .conf-pct { font-family:'Orbitron'; font-size:11px; color:#0cf; }
       .conf-track { height:4px; background:#2a2a3a; border-radius:4px; overflow:hidden; }
       .conf-fill { height:100%; width:0%; background:linear-gradient(90deg,#2ecc71,#0cf,#e74c3c); transition:width 0.5s; }

       .stats-grid {
           display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px;
       }
       .stat-card {
           background:#0f0f1a; border:1px solid #2f2f4a; border-radius:12px;
           padding:6px 0; text-align:center;
       }
       .stat-label { font-size:8px; color:#aaa; }
       .stat-val { font-family:'Orbitron'; font-size:15px; font-weight:700; color:#fff; }

       .history-strip {
           display:flex; gap:5px; margin-bottom:12px; flex-wrap:wrap; justify-content:center;
       }
       .hist-dot {
           width:26px; height:26px; border-radius:6px; font-size:11px; font-weight:800;
           display:flex; align-items:center; justify-content:center;
       }
       .hist-t { background:#1f4a2a; color:#2ecc71; border:1px solid #2ecc71; }
       .hist-x { background:#5a2620; color:#e74c3c; border:1px solid #e74c3c; }
       .hist-empty { background:#1e1e2a; color:#555; border:1px solid #333; }

       .sw-footer {
           display:flex; justify-content:space-between; border-top:1px solid #ffffff20;
           padding-top:8px;
       }
       .sw-time { font-size:9px; font-family:monospace; color:#0cf9; }
       .sw-version { font-size:8px; color:#fff6; }

       @keyframes scanline {
           0% { transform: translateY(-100%); opacity:0.6; }
           100% { transform: translateY(300%); opacity:0; }
       }
       .scan-line {
           position:absolute; top:0; left:0; right:0; height:3px;
           background:linear-gradient(90deg, transparent, cyan, transparent);
           animation: scanline 0.7s ease-out forwards;
           pointer-events:none;
       }
   </style>
</head>
<body>

<iframe id="sunwin-frame" src="https://web.sunwin.qa" allowfullscreen></iframe>

<div class="status-bar">
   <div class="live-dot"></div>
   <span id="status-text">Đang đồng bộ...</span>
</div>

<button id="sw-toggle">🤖</button>

<div id="sw-panel">
   <div class="sw-header" id="sw-drag-handle">
       <div class="sw-brand">SUNWIN · <span>AI NEXUS</span></div>
       <div class="sw-controls">
           <button class="sw-ctrl" id="sw-min">−</button>
           <button class="sw-ctrl" id="sw-close">✕</button>
       </div>
   </div>

   <div class="sw-body">
       <div class="session-row">
           <span class="session-label">📌 MÃ PHIÊN</span>
           <span class="session-num" id="sw-session">#------</span>
       </div>

       <div class="last-result">
           <span class="last-result-label">🎲 KẾT QUẢ TRƯỚC</span>
           <div class="last-dice" id="sw-dice">
               <div class="dice-val">-</div>
               <div class="dice-val">-</div>
               <div class="dice-val">-</div>
           </div>
           <span class="last-total" id="sw-total">--</span>
           <span class="last-tag" id="sw-last-tag">---</span>
       </div>

       <div class="log-box" id="sw-log">⚡ Đang kết nối collector...</div>

       <div class="pred-box" id="pred-box">
           <div class="pred-label">🧠 DỰ ĐOÁN PHIÊN TIẾP THEO</div>
           <div class="pred-value pred-waiting" id="sw-prediction">--</div>
           <div class="conf-section">
               <div class="conf-row">
                   <span class="conf-label">HỆ SỐ TIN CẬY</span>
                   <span class="conf-pct" id="sw-conf-pct">--%</span>
               </div>
               <div class="conf-track">
                   <div class="conf-fill" id="sw-conf-fill" style="width:0%"></div>
               </div>
           </div>
       </div>

       <div class="stats-grid">
           <div class="stat-card"><div class="stat-label">🟢 TÀI</div><div class="stat-val" id="sw-tai-count">--</div></div>
           <div class="stat-card"><div class="stat-label">🔴 XỈU</div><div class="stat-val" id="sw-xiu-count">--</div></div>
           <div class="stat-card"><div class="stat-label">⚡ CHUỖI</div><div class="stat-val" id="sw-streak">--</div></div>
       </div>

       <div class="history-strip" id="sw-history"></div>

       <div class="sw-footer">
           <span class="sw-time" id="sw-time">--:--:--</span>
           <span class="sw-version">v3.0 · AI CORE</span>
       </div>
   </div>
</div>

<script>
(function() {
    const API_BASE = "https://sunwin-tool.onrender.com";
    const SOURCE_API = "https://api-sunwin-urrv.onrender.com/api/history";
    
    // Lưu phiên đã gửi (dùng localStorage thay vì GM_setValue)
    let lastSentSession = Number(localStorage.getItem("collector_last_session") || 0);
    let localHistory = JSON.parse(localStorage.getItem("sw_history") || "[]");
    
    function log(msg) {
        const el = document.getElementById("sw-log");
        if(el) el.innerHTML = msg;
        console.log("[COLLECTOR]", msg);
    }
    
    function setStatus(msg, isOk = true) {
        const statusEl = document.getElementById("status-text");
        if(statusEl) statusEl.textContent = msg;
        const dot = document.querySelector(".live-dot");
        if(dot) dot.style.background = isOk ? "#00ff88" : "#f44";
    }
    
    function normalizeResult(raw) {
        if(!raw) return null;
        const s = String(raw).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        if(s.includes("tai") || s === "tài") return "Tài";
        if(s.includes("xiu") || s.includes("xu") || s === "xỉu") return "Xỉu";
        return null;
    }
    
    function renderHistoryStrip() {
        const container = document.getElementById("sw-history");
        if(!container) return;
        container.innerHTML = "";
        const recent = localHistory.slice(-12);
        while(recent.length < 12) recent.unshift(null);
        recent.forEach(item => {
            const div = document.createElement("div");
            if(!item) {
                div.className = "hist-dot hist-empty";
                div.textContent = "?";
            } else if(item.r === "Tài") {
                div.className = "hist-dot hist-t";
                div.textContent = "T";
            } else {
                div.className = "hist-dot hist-x";
                div.textContent = "X";
            }
            container.appendChild(div);
        });
    }
    
    function updateUI(session, diceArr, total, result) {
        const sessionSpan = document.getElementById("sw-session");
        if(sessionSpan) sessionSpan.textContent = `#${session}`;
        const diceSpans = document.querySelectorAll("#sw-dice .dice-val");
        if(diceSpans.length === 3) {
            diceSpans.forEach((el, idx) => { el.textContent = diceArr[idx] ?? "-"; });
        }
        const totalSpan = document.getElementById("sw-total");
        if(totalSpan) totalSpan.textContent = total ?? "--";
        const tagSpan = document.getElementById("sw-last-tag");
        if(tagSpan && result) {
            if(result === "Tài") {
                tagSpan.textContent = "TÀI";
                tagSpan.className = "last-tag tag-tai";
            } else {
                tagSpan.textContent = "XỈU";
                tagSpan.className = "last-tag tag-xiu";
            }
        }
    }
    
    function addToHistory(result, dice, total) {
        localHistory.push({ r: result, dice: dice, total: total, ts: Date.now() });
        if(localHistory.length > 40) localHistory.shift();
        localStorage.setItem("sw_history", JSON.stringify(localHistory));
        renderHistoryStrip();
    }
    
    async function sendResult(session, dice, total, result) {
        try {
            log(`📡 Gửi phiên #${session} → ${result} (${dice.join(",")} tổng=${total})`);
            const response = await fetch(`${API_BASE}/api/result`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    session: session,
                    dice: dice,
                    total: total,
                    result: result,
                    ts: Date.now()
                })
            });
            const data = await response.json();
            log(`✅ Server: ${data.message || "OK"}`);
            if(session > lastSentSession) {
                lastSentSession = session;
                localStorage.setItem("collector_last_session", session);
            }
            setStatus(`✅ Phiên #${session} (${result})`);
            return true;
        } catch(err) {
            log(`❌ Lỗi gửi: ${err.message}`);
            setStatus(`⚠️ Lỗi gửi #${session}`, false);
            return false;
        }
    }
    
    async function fetchPrediction() {
        try {
            const resp = await fetch(`${API_BASE}/api/predict?_=${Date.now()}`);
            if(!resp.ok) return;
            const pred = await resp.json();
            const predEl = document.getElementById("sw-prediction");
            const confFill = document.getElementById("sw-conf-fill");
            const confPct = document.getElementById("sw-conf-pct");
            const taiCount = document.getElementById("sw-tai-count");
            const xiuCount = document.getElementById("sw-xiu-count");
            const streakEl = document.getElementById("sw-streak");
            
            if(pred.prediction) {
                const isTai = String(pred.prediction).toUpperCase().includes("TÀI");
                predEl.textContent = isTai ? "TÀI" : "XỈU";
                predEl.className = `pred-value ${isTai ? "pred-tai" : "pred-xiu"}`;
                const conf = pred.confidence ?? 0;
                if(confFill) confFill.style.width = `${conf}%`;
                if(confPct) confPct.textContent = `${conf}%`;
            }
            if(pred.stats) {
                if(taiCount) taiCount.textContent = pred.stats.tai ?? "--";
                if(xiuCount) xiuCount.textContent = pred.stats.xiu ?? "--";
                if(streakEl) streakEl.textContent = pred.stats.streak ?? "--";
            }
            
            // Hiệu ứng scan
            const box = document.getElementById("pred-box");
            if(box && !box.querySelector(".scan-line")) {
                const line = document.createElement("div");
                line.className = "scan-line";
                box.appendChild(line);
                setTimeout(() => line.remove(), 700);
            }
        } catch(e) {}
    }
    
    async function collect() {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000);
            const resp = await fetch(`${SOURCE_API}?_=${Date.now()}`, { signal: controller.signal });
            clearTimeout(timeoutId);
            
            if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            
            if(!data?.current) {
                log("⚠️ Không có data.current");
                return;
            }
            
            const c = data.current;
            const session = Number(c.Phien);
            if(isNaN(session)) return;
            
            const result = normalizeResult(c.Ket_qua);
            const dice = [
                Number(c.Xuc_xac_1 ?? c.xuc_xac_1 ?? 0),
                Number(c.Xuc_xac_2 ?? c.xuc_xac_2 ?? 0),
                Number(c.Xuc_xac_3 ?? c.xuc_xac_3 ?? 0)
            ];
            let total = Number(c.Tong ?? c.tong ?? 0);
            if(isNaN(total) && dice.every(v=>v>=1 && v<=6)) total = dice[0]+dice[1]+dice[2];
            if(isNaN(total)) total = 0;
            
            // Cập nhật UI luôn
            updateUI(session, dice, total, result);
            
            if(result && session > lastSentSession) {
                addToHistory(result, dice, total);
                await sendResult(session, dice, total, result);
            } else if(result && session === lastSentSession) {
                setStatus(`✔️ Phiên #${session} đã xử lý`);
                log(`Phiên #${session} đã gửi trước đó`);
            } else if(result && session < lastSentSession) {
                // Reset nếu phiên bị lùi
                log(`⚠️ Reset lastSent từ ${lastSentSession} → ${session-1}`);
                lastSentSession = session - 1;
                localStorage.setItem("collector_last_session", lastSentSession);
                addToHistory(result, dice, total);
                await sendResult(session, dice, total, result);
            } else if(!result) {
                setStatus(`🔄 Phiên #${session} chờ kết quả...`);
            }
        } catch(err) {
            log(`❌ Fetch lỗi: ${err.message}`);
            setStatus("⚠️ Mất kết nối API", false);
        }
    }
    
    // Drag & Drop
    const panel = document.getElementById("sw-panel");
    const handle = document.getElementById("sw-drag-handle");
    let dragging = false, startX, startY, startL, startT;
    
    handle.addEventListener("mousedown", (e) => {
        if(e.target.closest(".sw-controls")) return;
        dragging = true;
        const rect = panel.getBoundingClientRect();
        startL = rect.left;
        startT = rect.top;
        startX = e.clientX - startL;
        startY = e.clientY - startT;
        panel.style.right = "auto";
        panel.style.left = startL + "px";
        panel.style.top = startT + "px";
        e.preventDefault();
    });
    window.addEventListener("mousemove", (e) => {
        if(!dragging) return;
        let left = e.clientX - startX;
        let top = e.clientY - startY;
        left = Math.min(window.innerWidth - panel.offsetWidth - 8, Math.max(8, left));
        top = Math.min(window.innerHeight - panel.offsetHeight - 8, Math.max(8, top));
        panel.style.left = left + "px";
        panel.style.top = top + "px";
    });
    window.addEventListener("mouseup", () => { dragging = false; });
    
    // Controls
    const toggleBtn = document.getElementById("sw-toggle");
    document.getElementById("sw-min").onclick = () => panel.classList.toggle("mini");
    document.getElementById("sw-close").onclick = () => {
        panel.classList.add("hidden");
        toggleBtn.classList.add("show");
    };
    toggleBtn.onclick = () => {
        panel.classList.remove("hidden");
        toggleBtn.classList.remove("show");
    };
    
    // Clock
    function updateClock() {
        const timeSpan = document.getElementById("sw-time");
        if(timeSpan) timeSpan.textContent = new Date().toLocaleTimeString("vi-VN");
    }
    setInterval(updateClock, 1000);
    updateClock();
    
    // Khởi động
    renderHistoryStrip();
    collect();
    fetchPrediction();
    setInterval(collect, 2800);
    setInterval(fetchPrediction, 4500);
    
    log("🚀 Collector AI đã khởi động | API: " + API_BASE);
    setStatus("✅ Đã sẵn sàng");
})();
</script>
</body>
</html>
